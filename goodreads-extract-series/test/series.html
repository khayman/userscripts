<div data-react-class="ReactComponents.SeriesList" data-react-props="{&quot;series&quot;:[{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1289346452i/4163411._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;4163411&quot;,&quot;workId&quot;:&quot;4210693&quot;,&quot;bookUrl&quot;:&quot;/book/show/4163411-the-long-fall&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The Long Fall (Leonid McGill, #1)&quot;,&quot;bookTitleBare&quot;:&quot;The Long Fall&quot;,&quot;numPages&quot;:306,&quot;avgRating&quot;:3.79,&quot;ratingsCount&quot;:5696,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Bestselling mystery writer Walter Mosley\u0026apos;s electri…&quot;,&quot;html&quot;:&quot;Bestselling mystery writer Walter Mosley's electric new novel introduces a brand new investigator - Leonid McGill - and a gripping new set of challenges. We follow former rule-breaker Leonid McGill as he's buffeted between the overlords of New York's underbelly, desperate to turn straight, but unable to say no to a nicely paid job. When we're introduced, he's calling in old favours and greasing NYPD palms to uncover seemingly harmless information for a high-paying client. But when the former schoolmates on his list are bludgeoned to death one by one, McGill realises that a friendly reunion wasn't quite what his taskmaster had in mind. And the awkward questions that follow seem almost welcome in comparison to a visit from Willie Sanderson, a trained killer and 'modern-day Frankenstein', now primed to ensure that McGill breathes his last. THE LONG FALL shows Walter Mosley at the height of his powers, breathing new life into American crime writing with sassy dialogue and unflinching social truths. Vividly capturing a city not nearly as cleaned up as its politicians would have us believe, this is new Mosley - and it's just as good as the vintage kind.&quot;},&quot;textReviewsCount&quot;:664,&quot;publicationDate&quot;:&quot;2009&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;47 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/4210693-the-long-fall&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1348698669i/6608160._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;6608160&quot;,&quot;workId&quot;:&quot;6802104&quot;,&quot;bookUrl&quot;:&quot;/book/show/6608160-known-to-evil&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Known to Evil (Leonid McGill, #2)&quot;,&quot;bookTitleBare&quot;:&quot;Known to Evil&quot;,&quot;numPages&quot;:326,&quot;avgRating&quot;:3.98,&quot;ratingsCount&quot;:3259,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Leonid McGill knows something suspicious is going …&quot;,&quot;html&quot;:&quot;Leonid McGill knows something suspicious is going on as soon as the phone rings—no one calls him at this number. Alphonse Rinaldo, New York City’s ultimate fixer, the one man with a hand in every dark decision made in the five boroughs, has a problem that he needs McGill’s help to handle. What Rinaldo can’t accomplish on his own, McGill doesn’t really want to know. But Rinaldo’s not a client a Manhattan private eye can say no to, so McGill runs uptown to check on the young woman Rinaldo is worried about. McGill’s hardly pleased, but not especially surprised, when he walks into the middle of a murder scene—and, thanks to his nefarious past, winds up as the NYPD’s prime suspect.\u003cbr /\u003eEveryone’s motives are murky in McGill’s world; that, he’s used to. What he’s not quite accustomed to is his own recent commitment to the straight and narrow, a path that still seems to lead him directly to the city’s crookedest corners and down its darkest alleys. When Rinaldo won’t let McGill drop the case, or reveal his connection to the young woman in question—simply insisting that she must be found—McGill strikes a dangerous deal with himself: he’ll find the girl, but he’s not going to hand her over until he knows all there is to know about her, and why exactly Rinaldo’s so interested.\u003cbr /\u003eAnd so McGill plunges deep into contemporary New York City as only Walter Mosley can expose it, navigating an underworld that—just beneath the glitz and glamour, hidden behind the safe, clean streets—pulses with danger and violence. This is where McGill plies his trade, and it’s from this that he’s determined to protect all that he’s come to love: his family, his friends, his soul—all of which seem determined to put themselves in harm’s way. To achieve all of this, he’ll have to make new alliances with the darkest, most dangerous acquaintances of his past. And if he can survive both his friends and his enemies with his charm and charisma intact, Leonid McGill will truly have earned his designation as the twenty-first century’s iconic noir hero.&quot;},&quot;textReviewsCount&quot;:318,&quot;publicationDate&quot;:&quot;2010&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;29 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/6802104-known-to-evil&quot;}}],&quot;seriesHeaders&quot;:[&quot;Book 1&quot;,&quot;Book 2&quot;]}"></div>
<div data-react-class="ReactComponents.SeriesList" data-react-props="{&quot;series&quot;:[{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1311706002i/9277013._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;9277013&quot;,&quot;workId&quot;:&quot;14158933&quot;,&quot;bookUrl&quot;:&quot;/book/show/9277013-when-the-thrill-is-gone&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;When the Thrill Is Gone (Leonid McGill, #3)&quot;,&quot;bookTitleBare&quot;:&quot;When the Thrill Is Gone&quot;,&quot;numPages&quot;:359,&quot;avgRating&quot;:4.0,&quot;ratingsCount&quot;:2774,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;The economy has hit the private-investigator busin…&quot;,&quot;html&quot;:&quot;The economy has hit the private-investigator business hard, even for Leonid McGill. Lately, he is getting job offers only from the criminals he's worked so hard to leave behind. Meanwhile, his personal life grows ever more complicated: his favorite stepson, Twill, drops out of school for mysteriously lucrative pursuits; his best friend, Gordo, has been diagnosed with cancer and is living on his couch; his wife has taken a new lover, and seems to be endangering the McGill family; and his girlfriend, Aura, is back in his life but intent on some serious conversations\u003cbr /\u003eSo how can McGill say no to the beautiful young woman who walks into his office with a stack of cash? She's an artist, she says, who escaped from poverty via a marriage to a rich art collector who keeps her on a stipend. But she tells McGill that she fears for her life, and that she needs his help to make sure she doesn’t meet the fate of her husband’s first two wives.\u003cbr /\u003eMcGill knows better than to believe every word a potential client says, but this isn't a job he can afford to turn away, even as he senses that—if his family's misadventures don't kill him first—sorting out the truth in her story will propel him to confront some surprising, even shocking, truths.\u003cbr /\u003eAs he did in his first two Leonid McGill mysteries, the bestselling The Long Fall and Known to Evil, Walter Mosley creates the vivid and engrossing world of a New York where motives are always suspect and nothing is as it seems.&quot;},&quot;textReviewsCount&quot;:290,&quot;publicationDate&quot;:&quot;2011&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;23 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/14158933-when-the-thrill-is-gone-leonid-mcgill-mystery-3&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1322687747i/12256096._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;12256096&quot;,&quot;workId&quot;:&quot;17230801&quot;,&quot;bookUrl&quot;:&quot;/book/show/12256096-all-i-did-was-shoot-my-man&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;All I Did Was Shoot My Man (Leonid McGill, #4)&quot;,&quot;bookTitleBare&quot;:&quot;All I Did Was Shoot My Man&quot;,&quot;numPages&quot;:326,&quot;avgRating&quot;:3.98,&quot;ratingsCount&quot;:2708,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Zella Grisham never denied shooting her boyfriend.…&quot;,&quot;html&quot;:&quot;Zella Grisham never denied shooting her boyfriend. That’s not why she did eight years of hard time on a sixteen-year sentence. It’s that the shooting inadvertently led to charges of grand theft. Talk about bad luck. \u003cbr /\u003e\u003cbr /\u003eLeonid McGill has reasons to believe she’s innocent. But reopening the case is only serving to unsettle McGill’s private life even further—and expose a family secret that’s like a kick to the gut. \u003cbr /\u003e\u003cbr /\u003eAs the case unfolds, as the truth of what happened eight years ago becomes more damning and more complex than anyone dreamed, McGill and Zella realize that everyone is guilty of something, and that sometimes the sins of the past can be too damaging to ever forget. Or ever forgive.&quot;},&quot;textReviewsCount&quot;:320,&quot;publicationDate&quot;:&quot;2012&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;20 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/17230801-all-i-did-was-shoot-my-man&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1413854620i/22926525._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;22926525&quot;,&quot;workId&quot;:&quot;42495725&quot;,&quot;bookUrl&quot;:&quot;/book/show/22926525-and-sometimes-i-wonder-about-you&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;And Sometimes I Wonder About You (Leonid McGill #5)&quot;,&quot;bookTitleBare&quot;:&quot;And Sometimes I Wonder About You&quot;,&quot;numPages&quot;:272,&quot;avgRating&quot;:4.14,&quot;ratingsCount&quot;:2307,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003eThe welcome return of Leonid McGill, Walter Mosley…\u003c/b\u003e&quot;,&quot;html&quot;:&quot;\u003cb\u003eThe welcome return of Leonid McGill, Walter Mosley's NYC-based private eye, his East Coast foil to his immortal L.A.-based detective Easy Rawlins. As the \u003ci\u003eBoston Globe\u003c/i\u003e raved, \&quot;A poignantly real character, [McGill is] not only the newest of the great fictional detectives, but also an incisive and insightful commentator on the American scene.\&quot;\u003cbr /\u003e \u003c/b\u003e \u003cbr /\u003e    \u003cbr /\u003e In the fifth Leonid McGill novel, Leonid finds himself in an unusual pickle of trying to balance his cases with his chaotic personal life. Leonid's father is still out there somewhere, and his wife is in an uptown sanitarium trying to recover from the deep depression that led to her attempted suicide in the previous novel. His wife's condition has put a damper on his affair with Aura Ullman, his girlfriend. And his son, Twill, has been spending a lot of time out of the office with his own case, helping a young thief named Fortune and his girlfriend, Liza.\u003cbr /\u003e     Meanwhile, Leonid is approached by an unemployed office manager named Hiram Stent to track down the whereabouts of his cousin, Celia, who is about to inherit millions of dollars from her father's side of the family. Leonid declines the case, but after his office is broken into and Hiram is found dead, he gets reeled into the underbelly of Celia's wealthy old-money family. It's up to Leonid to save who he can and incriminate the guilty; all while helping his son finish his own investigation; locating his own father; reconciling (whatever that means) with his wife and girlfriend; and attending the wedding of Gordo, his oldest friend.&quot;},&quot;textReviewsCount&quot;:257,&quot;publicationDate&quot;:&quot;2015&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;19 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/42495725-and-sometimes-i-wonder-about-you-leonid-mcgill-5&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1580793704i/46207653._SX120_.jpg&quot;,&quot;bookId&quot;:&quot;46207653&quot;,&quot;workId&quot;:&quot;71177528&quot;,&quot;bookUrl&quot;:&quot;/book/show/46207653-trouble-is-what-i-do&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Trouble Is What I Do (Leonid McGill #6)&quot;,&quot;bookTitleBare&quot;:&quot;Trouble Is What I Do&quot;,&quot;numPages&quot;:288,&quot;avgRating&quot;:3.96,&quot;ratingsCount&quot;:3157,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003eMorally ambiguous P.I. Leonid McGill is back -- an…\u003c/b\u003e&quot;,&quot;html&quot;:&quot;\u003cb\u003eMorally ambiguous P.I. Leonid McGill is back -- and investigating crimes against society's most downtrodden -- in this installment of the beloved detective series from an Edgar Award-winning and bestselling crime novelist.\u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003e Leonid McGill's spent a lifetime building up his reputation in the New York investigative scene. His seemingly infallible instinct and inside knowledge of the crime world make him the ideal man to help when Phillip Worry comes knocking.\u003cbr /\u003e\u003cbr /\u003e Phillip \&quot;Catfish\&quot; Worry is a 92-year-old Mississippi bluesman who needs Leonid's help with a simple task: deliver a letter revealing the black lineage of a wealthy heiress and her corrupt father. Unsurprisingly, the opportunity to do a simple favor while shocking the prevailing elite is too much for Leonid to resist.\u003cbr /\u003e\u003cbr /\u003e But when a famed and feared assassin puts a hit on Catfish, Leonid has no choice but to confront the ghost of his own felonious past. Working to protect his client and his own family, Leonid must reach the heiress on the eve of her wedding before her powerful father kills those who hold their family's secret.\u003cbr /\u003e\u003cbr /\u003e Joined by a team of young and tough aspiring investigators, Leonid must gain the trust of wary socialites, outsmart vengeful thugs, and, above all, serve the truth -- no matter the cost.\u003cbr /\u003e\u003cbr /\u003e\u003cbr /\u003e &quot;},&quot;textReviewsCount&quot;:486,&quot;publicationDate&quot;:&quot;2020&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;14 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/71177528-trouble-is-what-i-do&quot;}}],&quot;seriesHeaders&quot;:[&quot;Book 3&quot;,&quot;Book 4&quot;,&quot;Book 5&quot;,&quot;Book 6&quot;]}"></div>
