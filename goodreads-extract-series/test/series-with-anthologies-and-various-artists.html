ENT, HARLEQUIN!\&quot; SAID THE TICKTOCKMAN, \u003ci\u003eby Harlan Ellison\u003c/i\u003e\u003cbr /\u003eA John Birch world of the future where tardiness takes time off your life, and a joker who's never on time throws jelly-beans into the clockworks.\u003cbr /\u003e\u003cbr /\u003e\u003ci\u003eFour Distinguised Runners-up:\u003c/i\u003e\u003cbr /\u003e\u003cbr /\u003eTHE DROWNED GIANT, \u003ci\u003eby J.G. Ballard\u003c/i\u003e\u003cbr /\u003eCOMPUTERS DON'T ARGUE, \u003ci\u003eby Gordon R. Dickson\u003c/i\u003e\u003cbr /\u003eBECALMED IN HELL, \u003ci\u003eby Larry Niven\u003c/i\u003e\u003cbr /\u003eBALANCED ECOLOGY, \u003ci\u003eby James H. Schmitz\u003c/i\u003e\u003cbr /\u003e\u003cbr /\u003e\u003ci\u003e\&quot;The stories in this book...show the quality of modern science fiction, its range, and, I think, its growing depth and maturity. Science fiction has come a long way.\&quot;\u003c/i\u003e --DAMON KNIGHT\u003cbr /\u003e\u003cbr /\u003eContents \u003cbr /\u003e\u003cbr /\u003e ix • Introduction (Nebula Award Stories) • (1966) • essay by Damon Knight\u003cbr /\u003e 1 • The Doors of His Face, the Lamps of His Mouth • (1965) • novelette by Roger Zelazny\u003cbr /\u003e 34 • Balanced Ecology • (1965) • shortstory by James H. Schmitz\u003cbr /\u003e 53 • \&quot;Repent, Harlequin!\&quot; Said the Ticktockman • (1965) • shortstory by Harlan Ellison\u003cbr /\u003e 65 • He Who Shapes • (1965) • novella by Roger Zelazny\u003cbr /\u003e 151 • Computers Don't Argue • (1965) • shortstory by Gordon R. Dickson\u003cbr /\u003e 165 • Becalmed in Hell • [Known Space] • (1965) • shortstory by Larry Niven\u003cbr /\u003e 178 • The Saliva Tree • (1965) • novella by Brian W. Aldiss\u003cbr /\u003e 234 • The Drowned Giant • (1964) • shortstory by J. G. Ballard&quot;},&quot;textReviewsCount&quot;:12,&quot;publicationDate&quot;:&quot;1966&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;15 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/6520271-nebula-awards-stories&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1196630389i/1964669._SX120_.jpg&quot;,&quot;bookId&quot;:&quot;1964669&quot;,&quot;workId&quot;:&quot;1967782&quot;,&quot;bookUrl&quot;:&quot;/book/show/1964669.Nebula_Award_Stories_2&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Nebula Award Stories 2&quot;,&quot;bookTitleBare&quot;:&quot;Nebula Award Stories 2&quot;,&quot;numPages&quot;:256,&quot;avgRating&quot;:3.72,&quot;ratingsCount&quot;:115,&quot;author&quot;:{&quot;id&quot;:33297,&quot;name&quot;:&quot;Brian W. Aldiss&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/33297.Brian_W_Aldiss&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/33297.Brian_W_Aldiss&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;These stories, first published in 1966, represent …&quot;,&quot;html&quot;:&quot;These stories, first published in 1966, represent an exciting and important time in the history of science fiction -- the era when SF became true literature. Editors for this volume are BRIAN W. ALDISS and HARRY HARRISON. ALDISS is a prolific award-winning author of over two dozen novels, hundreds of short stories, several critical works, and poetry. His latest novels are THE TWINKLING OF AN OR MY LIFE AS AN ENGLISHMAN and SUPERTOYS. The multiple award-winning author of dozens of novels of speculative fiction, HARRISON is best known for The Stainless Steel Rat series, MAKE ROOM! MAKE ROOM! (the basis for the film SOYLENT GREEN), and the alternate history novels STARS \u0026amp; STRIPES FOREVER and STARS \u0026amp; STRIPES IN PERIL. He lives in Ireland. The Secret Place by Richard McKenna - \&quot;[A} sensitive piece of writing, a perfect example of second generation science fiction, the retelling and reexamination of a theme that originated in the pulp years...\&quot; Light of Other Days by Bob Shaw - The memorable classic featuring \&quot;slow glass\&quot; through which light takes a very long time to travel. Who Needs Insurance? by Robin S. Scott - If one can be accident prone, then perhaps one can be \&quot;safety-prone\&quot; -- but why? Among the Hairy Earthmen by R.A. Lafferty - Earth is nothing more than a bloody playground for the children of the gods. The Last Castle by Jack Vance - A prime example of one of Vance's \&quot;haunting mood-possessed visions of the distant future, written in a style that stirs the reader to reaction and response.\&quot; Day Million by Frederik Pohl - A very short story \&quot;jewel-like conciseness\&quot; of future love, life, and romance. When I Was Miss Dow by Sonya Dorman - \&quot;[A] sense of strangeness, more than a bit of human warmth, as well as a good strong whiff of alien strangeness.\&quot; Call Him Lord by Gordon R. Dickson - Earth proves to be a testing ground for the son of an emperor of a hundred worlds. In the Imagicon by George Henry Smith - \&quot;What good was paradise without something to compare it to? Without a taste of hell from time to time, how could a man appreciate heaven?\&quot; We Can Remember It For You Wholesale by Philip K. Dick - Now better know as the story on which film Total Recall was based, the original is a far more subtle questioning of reality. Man In His Time by Brian W. Aldiss - The sole survivor of crash landing on Mars returns to Earth, but is 3.3077 minutes ahead of the rest of the world.&quot;},&quot;textReviewsCount&quot;:13,&quot;publicationDate&quot;:&quot;1967&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;5 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/1967782-nebula-award-stories-two&quot;}}],&quot;seriesHeaders&quot;:[&quot;Book 1&quot;,&quot;Book 2&quot;]}"></div>
