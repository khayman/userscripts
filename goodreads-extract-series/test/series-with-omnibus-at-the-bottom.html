ellow-dog-featuring-an-original-easy-rawlins-short-story-gra&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1336545457i/64383._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;64383&quot;,&quot;workId&quot;:&quot;1965052&quot;,&quot;bookUrl&quot;:&quot;/book/show/64383.Gone_Fishin_&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Gone Fishin' (Easy Rawlins, #6)&quot;,&quot;bookTitleBare&quot;:&quot;Gone Fishin'&quot;,&quot;numPages&quot;:208,&quot;avgRating&quot;:3.9,&quot;ratingsCount&quot;:3187,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;It’s 1939 and Easy and Mouse are young men just se…&quot;,&quot;html&quot;:&quot;It’s 1939 and Easy and Mouse are young men just setting out in life—Easy has yet to develop his skill for unraveling the secrets of others, and Mouse has yet to kill his first man. But all that will soon change.\u003cbr /\u003e\u003cbr /\u003eIn the beginning there was Ezekiel \&quot;Easy\&quot; Rawlins and Raymond \&quot;Mouse\&quot; Alexander, two young men setting out in life, hitting the road in a \&quot;borrowed\&quot; '36 Ford headed for Pariah, Texas. The volatile Mouse wants to retrieve money from his stepfather so he can marry his Etta Mae.\u003cbr /\u003e\u003cbr /\u003eBut on their steamy bayou excursion, Mouse will choose murder as a way out, while Easy's past liaison with Etta Mae floats precariously in his memory. Easy and Mouse are coming of age and everything they ever knew about friendship and about themselves is coming apart at the seams.\u003cbr /\u003e\u003cbr /\u003eAs Mosley takes Easy and Mouse on this journey to manhood, he weaves together a remarkable cast of friends and foes, who are introduced here for the first time and will later appear in Easy Rawlins mysteries. This is the chance to unravel the mystery behind the souls of every character.&quot;},&quot;textReviewsCount&quot;:248,&quot;publicationDate&quot;:&quot;1997&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;48 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/1965052-gone-fishin-featuring-an-original-easy-rawlins-short-story-smoke-ea&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1297740279i/84545.jpg&quot;,&quot;bookId&quot;:&quot;84545&quot;,&quot;workId&quot;:&quot;81609&quot;,&quot;bookUrl&quot;:&quot;/book/show/84545.Bad_Boy_Brawly_Brown&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Bad Boy Brawly Brown (Easy Rawlins #7)&quot;,&quot;bookTitleBare&quot;:&quot;Bad Boy Brawly Brown&quot;,&quot;numPages&quot;:360,&quot;avgRating&quot;:3.99,&quot;ratingsCount&quot;:3408,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Set in 1964, Easy is on a mission to lure Brawley …&quot;,&quot;html&quot;:&quot;Set in 1964, Easy is on a mission to lure Brawley Brown back to his mother. But not only is Brawley bad, he's big and not so easily swayed, especially since joining the Urban Revolutionary Party, a political group wary of strangers. Add to that a cache of stolen guns, secret government investigators, a payroll heist, several murders, problems with his son, and everybody lying about everything, plus his own crushing guilt over the apparent death of his best friend, and you've got Easy behind the eight ball once again.&quot;},&quot;textReviewsCount&quot;:229,&quot;publicationDate&quot;:&quot;2002&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;59 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/81609-bad-boy-brawly-brown&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1336545504i/64381._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;64381&quot;,&quot;workId&quot;:&quot;2676767&quot;,&quot;bookUrl&quot;:&quot;/book/show/64381.Six_Easy_Pieces&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Six Easy Pieces (Easy Rawlins #8)&quot;,&quot;bookTitleBare&quot;:&quot;Six Easy Pieces&quot;,&quot;numPages&quot;:288,&quot;avgRating&quot;:4.13,&quot;ratingsCount&quot;:2599,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Walter Mosley\u0026apos;s bestselling and award-winning nove…&quot;,&quot;html&quot;:&quot;Walter Mosley's bestselling and award-winning novels -- from \u003ci\u003eGone Fishin'\u003c/i\u003e to \u003ci\u003eDevil in a Blue Dress,\u003c/i\u003e named one of the \&quot;100 Favorite Mysteries of the Century\&quot; by the Independent Mystery Booksellers Association -- have endeared him to legions of readers from a U.S. president to everyday people who can't get enough of Easy Rawlins. \u003cp\u003e Now from the bestselling and award-winning writer comes \u003ci\u003eSix Easy Pieces. \u003c/i\u003eThe beloved Ezekiel Rawlins now has a steady job as senior head custodian of Sojourner Truth High School, a nice house with a garden, a loving woman, and children. He counts the blessings of leading a law-abiding life, but is \&quot;nowhere near happy.\&quot; Easy mourns the loss of his best friend, Mouse. Though Easy tries to leave the street life behind, he still finds himself trading favors and investigating cases of arson, murder, and missing people. People who can't depend on the law to solve their problems seek out Easy. \u003c/p\u003e\u003cp\u003e A bomb is set in the high school where Easy works. A man's daughter runs off with his employee. A beautiful woman turns up dead and the man who loved her is wrongly accused. Easy is the man people turn to in search of justice and retribution. He even becomes party to a killing that the police might call murder. \u003c/p\u003e\u003cp\u003e Six of the seven stories in \u003ci\u003eSix Easy Pieces\u003c/i\u003e were published in reissued Washington Square Press editions of the Easy Rawlins mysteries \u003ci\u003eGone Fishin', Devil in a Blue Dress, A Red Death, White Butterfly, Black Betty,\u003c/i\u003e and \u003ci\u003eA Little Yellow Dog.\u003c/i\u003e A seventh, \&quot;Amber Gate,\&quot; is newly published here, making this new Walter Mosley classic a must-have for all fans of great fiction.\u003c/p\u003e&quot;},&quot;textReviewsCount&quot;:190,&quot;publicationDate&quot;:&quot;2003&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;23 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/2676767-six-easy-pieces-easy-rawlins-stories&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i /compressed.photo.goodreads.com/books/1389396218i/84530._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;84530&quot;,&quot;workId&quot;:&quot;828322&quot;,&quot;bookUrl&quot;:&quot;/book/show/84530.Cinnamon_Kiss&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Cinnamon Kiss (Easy Rawlins #10)&quot;,&quot;bookTitleBare&quot;:&quot;Cinnamon Kiss&quot;,&quot;numPages&quot;:336,&quot;avgRating&quot;:3.98,&quot;ratingsCount&quot;:3493,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;In this thrilling mystery, Easy Rawlins takes a jo…&quot;,&quot;html&quot;:&quot;In this thrilling mystery, Easy Rawlins takes a job to find a missing attorney and his beautiful assistant—and faces danger around every corner.\u003cbr /\u003e\u003cbr /\u003eIt is the Summer of Love and Easy Rawlins is contemplating robbing an armored car. It's farther outside the law than Easy has ever traveled, but his daughter, Feather, needs a medical treatment that costs far more than Easy can earn or borrow in time. And his friend Mouse tells him it's a cinch.\u003cbr /\u003e\u003cbr /\u003eThen another friend, Saul Lynx, offers a job that might solve Easy's problem without jail time. He has to track the disappearance of an eccentric, prominent attorney. His assistant of sorts, the beautiful \&quot;Cinnamon\&quot; Cargill, is gone as well. Easy can tell there is much more than he is being Robert Lee, his new employer, is as suspect as the man who disappeared. But his need overcomes all concerns, and he plunges into unfamiliar territory, from the newfound hippie enclaves to a vicious plot that stretches back to the battlefields of Europe.&quot;},&quot;textReviewsCount&quot;:259,&quot;publicationDate&quot;:&quot;2005&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;57 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/828322-cinnamon-kiss&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1425318611i/597170._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;597170&quot;,&quot;workId&quot;:&quot;3203279&quot;,&quot;bookUrl&quot;:&quot;/book/show/597170.Blonde_Faith&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Blonde Faith (Easy Rawlins #11)&quot;,&quot;bookTitleBare&quot;:&quot;Blonde Faith&quot;,&quot;numPages&quot;:308,&quot;avgRating&quot;:4.03,&quot;ratingsCount&quot;:3388,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Easy Rawlins, L.A.\u0026apos;s most reluctant detective, com…&quot;,&quot;html&quot;:&quot;Easy Rawlins, L.A.'s most reluctant detective, comes home one day to find Easter, the daughter of his friend Chrismas Black, left on his doorstep. Easy knows that this could only mean that the ex-marine Black is probably dead, or will be soon. Easter's appearance is only the beginning, as Easy is immersed in a sea of problems. The love of his life is marrying another man and his friend Mouse is wanted for the murder of a father of 12. As he's searching for a clue to Christmas Black's whereabouts, two suspicious MPs hire him to find his friend Black on behalf of the U.S. Army. Easy's investigation brings him to Faith Laneer, a blonde woman with a dark past. As Easy begins to put the pieces together, he realizes that Black's dissappearance has its roots in Vietnam, and that Faith might be in a world of danger.&quot;},&quot;textReviewsCount&quot;:305,&quot;publicationDate&quot;:&quot;2007&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;42 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/3203279-blonde-faith&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1542231146i/15981687._SX120_.jpg&quot;,&quot;bookId&quot;:&quot;15981687&quot;,&quot;workId&quot;:&quot;21734499&quot;,&quot;bookUrl&quot;:&quot;/book/show/15981687-little-green&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Little Green (Easy Rawlins, #12)&quot;,&quot;bookTitleBare&quot;:&quot;Little Green&quot;,&quot;numPages&quot;:291,&quot;avgRating&quot;:4.11,&quot;ratingsCount&quot;:3725,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;When Walter Mosley burst onto the literary scene i…&quot;,&quot;html&quot;:&quot;When Walter Mosley burst onto the literary scene in 1990 with his first Easy Rawlins mystery, \u003ci\u003eDevil in a Blue Dress\u003c/i\u003e—a combustible mixture of Raymond Chandler and Richard Wright—he captured the attention of hundreds of thousands of readers (including future president Bill Clinton). Eleven books later, Easy Rawlins is one of the few private eyes in contemporary crime fiction who can be called iconic and immortal. In the incendiary and fast-paced \u003ci\u003eLittle Green\u003c/i\u003e, he returns from the brink of death to investigate the dark side of L.A.’s 1960s hippie haven, the Sunset Strip.\u003cbr /\u003e\u003cbr /\u003eWe last saw Easy in 2007’s \u003ci\u003eBlonde Faith\u003c/i\u003e, fighting for his life after his car plunges over a cliff. True to form, the tough WWII veteran survives, and soon his murderous sidekick Mouse has him back cruising the mean streets of L.A., in all their psychedelic 1967 glory, to look for a young black man, Evander “Little Green” Noon, who disappeared during an acid trip. Fueled by an elixir called Gator’s Blood, brewed by the conjure woman Mama Jo, Easy experiences a physical, spiritual, and emotional resurrection, but peace and love soon give way to murder and mayhem. Written with Mosley’s signature grit and panache, this engrossing and atmospheric mystery is not only a trip back in time, it is also a tough-minded exploration of good and evil, and of the power of guilt and redemption. Once again, Easy asserts his reign over the City of (Fallen) Angels.&quot;},&quot;textReviewsCount&quot;:533,&quot;publicationDate&quot;:&quot;2013&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;32 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/21734499-little-green&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1393787135i/20342538._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;20342538&quot;,&quot;workId&quot;:&quot;28322758&quot;,&quot;bookUrl&quot;:&quot;/book/show/20342538-rose-gold&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Rose Gold (Easy Rawlins #13)&quot;,&quot;bookTitleBare&quot;:&quot;Rose Gold&quot;,&quot;numPages&quot;:308,&quot;avgRating&quot;:4.04,&quot;ratingsCount&quot;:2941,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Rose Gold is two colors, one woman, and a big head…&quot;,&quot;html&quot;:&quot;Rose Gold is two colors, one woman, and a big headache.\u003cbr /\u003e\u003cbr /\u003eIn this new mystery set in the Patty Hearst era of radical black nationalism and political abductions, a black ex-boxer self-named Uhuru Nolica, the leader of a revolutionary cell called Scorched Earth, has kidnapped Rosemary Goldsmith, the daughter of a weapons manufacturer, from her dorm at UC Santa Barbara. If they don't receive the money, weapons, and apology they demand, \&quot;Rose Gold\&quot; will die-horribly and publicly. So the FBI, the State Department, and the LAPD turn to Easy Rawlins, the one man who can cross the necessary borders to resolve this dangerous standoff. With twelve previous adventures since 1990, Easy Rawlins is one of the small handful of private eyes in contemporary crime fiction who can be called immortal. Rose Gold continues his ongoing and unique achievement in combining the mystery/PI genre form with a rich social history of postwar Los Angeles-and not just the black parts of that sprawling city.&quot;},&quot;textReviewsCount&quot;:337,&quot;publicationDate&quot;:&quot;2014&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;25 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/28322758-rose-gold-easy-rawlins-13&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1449477643i/27068670._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;27068670&quot;,&quot;workId&quot;:&quot;47111088&quot;,&quot;bookUrl&quot;:&quot;/book/show/27068670-charcoal-joe&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Charcoal Joe (Easy Rawlins #14)&quot;,&quot;bookTitleBare&quot;:&quot;Charcoal Joe&quot;,&quot;numPages&quot;:320,&quot;avgRating&quot;:4.11,&quot;ratingsCount&quot;:3611,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003eWalter Mosley’s indelible detective Easy Rawlins i…\u003c/b\u003e&quot;,&quot;html&quot;:&quot;\u003cb\u003eWalter Mosley’s indelible detective Easy Rawlins is back, with a new detective agency and a new mystery to solve.\u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003ePicking up where Rose Gold left off in L.A. in the late 1960s, Ezekiel “Easy” Rawlins finds his life in transition. He’s ready to—finally—propose to his girlfriend, Bonnie Shay, and start a life together. And he’s taken the money he got from the Rose Gold case and has, together with two partners, started a new detective agency. But, inevitably, a case gets in the way: Easy’s friend Mouse introduces him to Rufus Tyler, a very old man everyone calls Charcoal Joe. Joe’s friend’s son, Seymour (young, bright, top of his class at Stanford), has been arrested and charged with the murder of a white man from Redondo Beach. Rufus tells Easy he will pay and pay well to see his nephew exonerated, but seeing as how Seymour was literally found standing over the man’s dead body at his cabin home and the racially charged motives behind it, that might prove to be a tall order.\u003cbr /\u003e\u003cbr /\u003eBetween his new company, a heart that should be broken but is not, a whole raft of new bad guys on his tail, and a bad odor that surrounds Charcoal Joe, Easy has his hands full, his horizons askew, and a life in shambles on the ground around his feet.&quot;},&quot;textReviewsCount&quot;:476,&quot;publicationDate&quot;:&quot;2016&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;5 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/47111088-charcoal-joe-easy-rawlins-14&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1592878866i/53915343._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;53915343&quot;,&quot;workId&quot;:&quot;84271415&quot;,&quot;bookUrl&quot;:&quot;/book/show/53915343-blood-grove&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Blood Grove (Easy Rawlins, #15)&quot;,&quot;bookTitleBare&quot;:&quot;Blood Grove&quot;,&quot;numPages&quot;:320,&quot;avgRating&quot;:4.04,&quot;ratingsCount&quot;:3428,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u0026quot;Master of craft and narrative\u0026quot; Walter Mosley retu…&quot;,&quot;html&quot;:&quot;\&quot;Master of craft and narrative\&quot; Walter Mosley returns with this crowning achievement in the Easy Rawlins saga, in which the iconic  detective's loyalties are tested on the sun-soaked streets of Southern California (National Book Foundation) \u003cbr /\u003e\u003cbr /\u003eIt is 1969, and flames can be seen on the horizon, protest wafts like smoke though the thick air, and Easy Rawlins, the Black private detective whose small agency finally has its own office, gets a visit from a white Vietnam veteran. The young man comes to Easy with a story that makes little sense. He and his lover, a beautiful young woman, were attacked in a citrus grove at the city’s outskirts. He may have killed a man, and the woman and his dog are now missing. Inclined to turn down what sounds like nothing but trouble, Easy takes the case when he realizes how damaged the young vet is from his war experiences—the bond between veterans superseding all other considerations.\u003cbr /\u003e \u003cbr /\u003eThe veteran is not Easy’s only unlooked-for trouble. Easy’s adopted daughter Feather’s white uncle shows up uninvited, raising questions and unsettling the life Easy has long forged for the now young woman. Where Feather sees a family reunion, Easy suspects something else, something that will break his heart.\u003cbr /\u003e \u003cbr /\u003eBlood Grove is a crackling, moody, and thrilling race through a California of hippies and tycoons, radicals and sociopaths, cops and grifters, both men and women. Easy will need the help of his friends—from the genius Jackson Blue to the dangerous Mouse Alexander, Fearless Jones, and Christmas Black—to make sense of a case that reveals the darkest impulses humans harbor. \u003cbr /\u003e \u003cbr /\u003eBlood Grove is a novel of vast scope and intimate insight, and a soulful call for justice by any means necessary.\u003cbr /\u003e &quot;},&quot;textReviewsCount&quot;:445,&quot;publicationDate&quot;:&quot;2021&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;16 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/84271415-blood-grove-easy-rawlins-15&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1705005881i/201559449._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;201559449&quot;,&quot;workId&quot;:&quot;204104971&quot;,&quot;bookUrl&quot;:&quot;/book/show/201559449-farewell-amethystine&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Farewell, Amethystine (Easy Rawlins, #16)&quot;,&quot;bookTitleBare&quot;:&quot;Farewell, Amethystine&quot;,&quot;numPages&quot;:336,&quot;avgRating&quot;:3.98,&quot;ratingsCount&quot;:2219,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;The Easy Rawlins novels follow the infamous detect…&quot;,&quot;html&quot;:&quot;The Easy Rawlins novels follow the infamous detective Easy Rawlins solving mysteries on the sun-soaked streets of Southern California. Ezekiel \&quot;Easy\&quot; Porterhouse Rawlins is an unlicensed private investigator turned hard-boiled detective always willing to do what it takes to get things done in the racially charged, dark underbelly of Los Angeles.This is the latest highly anticipated Easy Rawlins novel, following on from Blood Grove.\u003cb\u003ePraise for Walter Mosley\u003c/b\u003e\&quot;Skitters across the spectrum between orthodox and radical like a polygraph needle wired to a nervy accomplice. Fans of his Easy Rawlins and Leonid McGill series will not be disappointed, for we remain in the realm of deliciously gritty noir.\&quot;? New York Times Book Review\&quot;Mosley is a master of craft and narrative, and through his incredibly vibrant and diverse body of work, our literary heritage has truly been enriched...\&quot; - National Book Foundation\&quot;The ability to simultaneously keep us readers in confusion and in thrall marks Mosley - winner of the National Book Foundation's 2020 Medal for Distinguished Contribution to American Letters - as a mystery master.\&quot; - Washington Post\&quot;Rawlins is the greatest contributor to Los Angeles' literary culture and its native son's repute.\&quot; - LA Times\&quot;Mosley's characteristic writing style is on full display.\&quot; ? Publishers Weekly&quot;},&quot;textReviewsCount&quot;:256,&quot;publicationDate&quot;:&quot;2024&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;12 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/204104971-farewell-amethystine-easy-rawlins-16&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1747279477i/223296106._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;223296106&quot;,&quot;workId&quot;:&quot;230359022&quot;,&quot;bookUrl&quot;:&quot;/book/show/223296106-gray-dawn&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Gray Dawn (Easy Rawlins, #17)&quot;,&quot;bookTitleBare&quot;:&quot;Gray Dawn&quot;,&quot;numPages&quot;:336,&quot;avgRating&quot;:4.22,&quot;ratingsCount&quot;:1441,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003eDetective Easy Rawlins has settled into the happy …\u003c/b\u003e&quot;,&quot;html&quot;:&quot;\u003cb\u003eDetective Easy Rawlins has settled into the happy rhythm of his new life when a dark siren from his past returns and threatens to destroy the peace he's fought for, in the latest installment from \&quot;master of craft and narrative\&quot; Walter Mosley in a legendary series (National Book Foundation). \u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003e The name Easy Rawlins stirs excitement in the hearts of readers and fear in the hearts of his foes. His success has bought him a thriving detective agency, with its first female detective; a remote home, shared with children and pets and lovers, high atop the hills overlooking gritty Los Angeles; and more trouble, more problems, and more threat to those whom he loves. In other words, he’s still beset on all sides.\u003cbr /\u003e  \u003cbr /\u003e A number of below-the-law powerbrokers plead with Easy to locate a mysterious, dangerous woman—Lutisha James, though she’s gone by another name that Easy will immediately recognize. 1970s Los Angeles is a transient city of delicate, violent balances, and Lutisha has disturbed that. She also has a secret that will upend Easy’s own life, painfully closer to home.&quot;},&quot;textReviewsCount&quot;:179,&quot;publicationDate&quot;:&quot;2025&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;5 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/230359022-gray-dawn-easy-rawlins-17&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1312047164i/2177745._SX120_.jpg&quot;,&quot;bookId&quot;:&quot;2177745&quot;,&quot;workId&quot;:&quot;2183423&quot;,&quot;bookUrl&quot;:&quot;/book/show/2177745.Walter_Mosley_s_Easy_Rawlins_Mysteries&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Walter Mosley's Easy Rawlins Mysteries (Easy Rawlins Mysteries, #1-5)&quot;,&quot;bookTitleBare&quot;:&quot;Walter Mosley's Easy Rawlins Mysteries&quot;,&quot;numPages&quot;:0,&quot;avgRating&quot;:4.47,&quot;ratingsCount&quot;:130,&quot;author&quot;:{&quot;id&quot;:20850,&quot;name&quot;:&quot;Walter Mosley&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/20850.Walter_Mosley&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/20850.Walter_Mosley&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003e\u003ci\u003eThe Easy Rawlins\u003c/i\u003e series together for the first tim…\u003c/b\u003e&quot;,&quot;html&quot;:&quot;\u003cb\u003e\u003ci\u003eThe Easy Rawlins\u003c/i\u003e series together for the first time in a 5-title gift set!\u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003eThe five most popular works by the foremost mystery-writer of the nineties, Walter Mosley, have been collected into a special slip-sleeve audio package\u003cbr /\u003e\u003cbr /\u003eWalter Mosley’s reluctant and existentially minded black detective, Easy Rawlins, has brought Mosley bestseller status and the type of mainstream literary acclaim usually denied writers of mystery thrillers. This outstanding five-volume set brings Rawlins to life and takes the listener into the intricate soul of a singular man. The earthy voice of actor Paul Winfield is the perfect match for the street smart, world weary Rawlins. The set includes:\u003cbr /\u003e\u003cbr /\u003e\u003ci\u003eA Red Death\u003c/i\u003e—Rawlins is forced to cut a deal with the FBI to get a corrupt, racist IRS agent off his back. However, Easy finds himself a prime suspect.\u003cbr /\u003e\u003cbr /\u003e\u003ci\u003eDevil in a Blue Dress\u003c/i\u003e—It seems simple enough...\u003cbr /\u003ethere’s good money if Easy can find Daphne Monet, a blond beauty known to frequent jazz clubs, but the case is much more than it appears to be. \u003cbr /\u003e\u003cbr /\u003e\u003ci\u003eA White Butterfly\u003c/i\u003e—The serial killing of three black bar girls doesn’t cause a stir until a white coed is similarly killed. The L.A.P.D. calls on Rawlins to go to places they can’t. \u003cbr /\u003e\u003cbr /\u003e\u003ci\u003eBlack Betty\u003c/i\u003e—Easy hunts for a sensuous woman who leaves a trail of murder and mayhem in her wake, and is plunged into the depths of America’s racial dilemmas and the mysteries of human character.\u003cbr /\u003e\u003cbr /\u003e\u003ci\u003eA Little Yellow Dog\u003c/i\u003e—Easy takes a nice quiet job. \u003cbr /\u003eUnfortunately, a teacher, two corpses, suspicious police, and a little yellow dog ring the bell on his peaceful existence.\u003cbr /\u003e&quot;},&quot;textReviewsCount&quot;:3,&quot;publicationDate&quot;:&quot;2001&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;2 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/2183423-walter-mosley-s-easy-rawlins-mysteries-easy-rowlins-mysteries&quot;}}],&quot;seriesHeaders&quot;:[&quot;Book 3&quot;,&quot;Book 4&quot;,&quot;Book 5&quot;,&quot;Book 6&quot;,&quot;Book 7&quot;,&quot;Book 8&quot;,&quot;Book 9&quot;,&quot;Book 10&quot;,&quot;Book 11&quot;,&quot;Book 12&quot;,&quot;Book 13&quot;,&quot;Book 14&quot;,&quot;Book 15&quot;,&quot;Book 16&quot;,&quot;Book 17&quot;,&quot;Book 1-5&quot;]}"></div>
