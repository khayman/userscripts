t;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;It\u0026apos;s the #1 New York Times bestselling series.\u003cbr/\u003e\u003cbr/\u003eLuca…&quot;,&quot;html&quot;:&quot;It's the #1 New York Times bestselling series.\u003cbr /\u003e\u003cbr /\u003eLucas Davenport goes on a city-to-city search for a bizarre ritualistic killer of a slumlord and a welfare supervisor butchered in Minneapolis . . . a rising political star executed in Manhattan . . . and an influential judge in Oklahoma City.\u003cbr /\u003e\u003cbr /\u003eAll the homicides have the same grisly method — the victim's throat is slashed with an Indian ceremonial knife – and in every case the twisted trail leads back through the Minnesota Native American community to an embodiment of primal evil known as Shadow Love. Once unleashed, Shadow Love's need to kill cannot be checked, even by those who think they control him. Soon he will be stalking Lucas Davenport — and the woman he loves...\u003cbr /\u003e\u003cbr /\u003eNever get involved with a cop, that's what Lieutenant Lucas Davenport has been warning women for years, but now he finds himself on dangerous ground with a policewoman named Lily Rothenburg, on assignment from New York to help investigate the murders. Both have other commitments, but neither can stop, and as their affair grows more intense, so too does the mayhem surrounding them, until the combined passion and violence threaten to spin out of control and engulf them both. Together, Lucas and Lily must stalk the drugged-out, desperate world of the city's meanest streets to flush out Shadow Love.\u003cbr /\u003e\u003cbr /\u003eGoodreads librarian's note: the first 35 books in the series are: 1, Rules of Prey, 1989; 2, Shadow Prey, 1990; 3, Eyes of Prey, 1991; 4, Silent Prey, 1992; 5, Winter Prey, 1993; 6, Night Prey, 1994; 7, Mind Prey, 1995; 8, Sudden Prey, 1996; 9, Secret Prey, 1998; 10, Certain Prey, 1999; 11, Easy Prey, 2000; 12, Chosen Prey, 2001; 13, Mortal Prey, 2002; 14, Naked Prey, 2003; 15, Hidden Prey, 2004; 16, Broken Prey, 2005; 17, Invisible Prey, 2007; 18, Phantom Prey, 2008; 19, Wicked Prey, 2009; 20, Storm Prey, 2010; 21, Buried Prey, 2011; 22, Stolen Prey, 2012; 23, Silken Prey, 2012; 24, Field of Prey, 2014; 25, Gathering Prey, 2015; 26, Extreme Prey, 2016; 27, Golden Prey, 2017; 28, Twisted Prey, 2018; 29, Neon Prey, 2019; 30, Masked Prey, 2020; 31, Ocean Prey, 2021, (Virgil Flowers 13); 32, Righteous Prey, 2022, (Virgil Flowers 14); 33, Judgment Prey, 2023, (Virgil Flowers 15); 34, Toxic Prey, 2024, (Letty Davenport 3); and 35, Lethal Prey, 2025, (Virgil Flowers 16).&quot;},&quot;textReviewsCount&quot;:1331,&quot;publicationDate&quot;:&quot;1990&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;1 edition&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/162784-shadow-prey&quot;}}],&quot;seriesHeaders&quot;:[&quot;Book 1&quot;,&quot;Book 2&quot;]}"></div>

llers who could be inside the police department, she draws Lucas into her orbit again, until their hunts merge, their twin obsessions driving them ever closer to the edge . . . and then over.\u003cbr /\u003e\u003cbr /\u003eLibrarian's note: the first five books in the Lucas Davenport series are #1, Rules of Prey, 1989; #2, Shadow Prey, 1990; #3, Eyes of Prey, 1991; #4, Silent Prey, 1992; and #5, Winter Prey, 1993.&quot;},&quot;textReviewsCount&quot;:850,&quot;publicationDate&quot;:&quot;1992&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;63 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/582951-silent-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1764799108i/37304._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;37304&quot;,&quot;workId&quot;:&quot;412645&quot;,&quot;bookUrl&quot;:&quot;/book/show/37304.Winter_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Winter Prey (Lucas Davenport, #5)&quot;,&quot;bookTitleBare&quot;:&quot;Winter Prey&quot;,&quot;numPages&quot;:343,&quot;avgRating&quot;:4.26,&quot;ratingsCount&quot;:47998,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u0026quot;Winter Prey\u0026quot; is a John Sandford suspense masterpi…&quot;,&quot;html&quot;:&quot;\&quot;Winter Prey\&quot; is a John Sandford suspense masterpiece!  Following the international success of \&quot;Shadow Prey\&quot; and \&quot;Silent Prey,\&quot; he creates another heart-pounding chapter in the career of Lucas Davenport, the brilliant, hard-bitten detective from the Twin Cities.\u003cbr /\u003e\u003cbr /\u003eThe Iceman is Lucas Davenport's most determined foe - a serial killer driven to cover his brutal tracks with blood.  Sandford again creates almost unbearable suspense as we wait for the Iceman's razor-sharp corn knife to strike again.\u003cbr /\u003e\u003cbr /\u003e\&quot;Winter Prey\&quot; unfolds in the cold and driving snow of the north country. The wilds of rural Wisconsin are the perfect setting for the chilling terror caused by the Iceman, a killer who knows Lucas' every move - a coldly brilliant madman who can't be stopped.  Turn up the heat and listen as Lucas Davenport faces his most dangerous challenge.\u003cbr /\u003e\u003cbr /\u003eLibrarian's note: the first five books in the Lucas Davenport series are #1, Rules of Prey, 1989; #2, Shadow Prey, 1990; #3, Eyes of Prey, 1991; #4, Silent Prey, 1992; and #5, Winter Prey, 1993.&quot;},&quot;textReviewsCount&quot;:1007,&quot;publicationDate&quot;:&quot;1993&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;2 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/412645-winter-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1341920902i/37296._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;37296&quot;,&quot;workId&quot;:&quot;1387061&quot;,&quot;bookUrl&quot;:&quot;/book/show/37296.Night_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Night Prey (Lucas Davenport, #6)&quot;,&quot;bookTitleBare&quot;:&quot;Night Prey&quot;,&quot;numPages&quot;:336,&quot;avgRating&quot;:4.2,&quot;ratingsCount&quot;:25870,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;After a two-year break, Minneapolis detective Luca…&quot;,&quot;html&quot;:&quot;After a two-year break, Minneapolis detective Lucas Davenport is back on the force. As Deputy Chief. His first problem is acerbic state investigator Meagan Connell, who is determined to prove a link between several particularly brutal attacks on women. The more Davenport looks into it, the more he suspects that Meagan is right to fear the worst. Somewhere out there, spying on his unknowing victims at their most intimate moments, lurks a killer of unusual skill and savagery – and he’s only just getting warmed up…&quot;},&quot;textReviewsCount&quot;:683,&quot;publicationDate&quot;:&quot;1994&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;68 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/1387061-night-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1435027890i/37298._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;37298&quot;,&quot;workId&quot;:&quot;179738&quot;,&quot;bookUrl&quot;:&quot;/book/show/37298.Mind_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Mind Prey (Lucas Davenport, #7)&quot;,&quot;bookTitleBare&quot;:&quot;Mind Prey&quot;,&quot;numPages&quot;:354,&quot;avgRating&quot;:4.25,&quot;ratingsCount&quot;:26499,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;From the bestselling author of Night Prey and Wint…&quot;,&quot;html&quot;:&quot;From the bestselling author of Night Prey and Winter Prey, Lucas Davenport is back in another great thriller. \u003cbr /\u003e\u003cbr /\u003eIt was raining when psychiatrist Andi Manette left the parent-teacher conference with her two young daughters. She was distracted and barely noticed the red van parked beside her, barely noticed the van door slide open as they dashed up to their car. But she did notice the hand reaching out for her and the voice from out of the past. And then the Manette family was gone.\u003cbr /\u003e\u003cbr /\u003eHours later, deputy chief Lucas Davenport stood in the parking lot, a blood-stained shoe in his hand, the ground stained pink around him, and knew that this would be one of the worst cases he'd ever been on. With an urgency born of dread, he presses the attack, while in an isolated farmhouse, Andi Manette does the same, summoning all her skills to battle an obsessed captor. She knows the man who has taken her and her daughters, knows there is a chink in his armor, if only she can find it. But for both her and Davenport, time is running out.\u003cbr /\u003e\u003cbr /\u003eJohn Sandford's novels have always been extraordinary for their harrowing twists, unforgettable characters, and crackling prose. Mind Prey tops them all. The work of a true master.&quot;},&quot;textReviewsCount&quot;:862,&quot;publicationDate&quot;:&quot;1995&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;2 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/179738-mind-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1388204671i/168569._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;168569&quot;,&quot;workId&quot;:&quot;1520707&quot;,&quot;bookUrl&quot;:&quot;/book/show/168569.Sudden_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Sudden Prey (Lucas Davenport, #8)&quot;,&quot;bookTitleBare&quot;:&quot;Sudden Prey&quot;,&quot;numPages&quot;:452,&quot;avgRating&quot;:4.21,&quot;ratingsCount&quot;:25339,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u0026quot;Sudden Prey\u0026quot; opens with a death and ends with one…&quot;,&quot;html&quot;:&quot;\&quot;Sudden Prey\&quot; opens with a death and ends with one.\u003cbr /\u003e\u003cbr /\u003eFor months, Lucas Davenport's men have been tracking a vicious woman bank robber named Candy, and when they finally catch up with her, she doesn't go quietly. In the ensuing shoot-out, she dies – and Davenport's nightmare starts. For her associates are even worse than she was, particularly her husband, a deeply violent man who swears an appropriate revenge. First he will find the names of those responsible and then he will kill those nearest and dearest to them, just the way they did Candy.\u003cbr /\u003e\u003cbr /\u003eSo it begins. The husband of one officer is shot and killed. The wife of another is ambushed at work. When a third attack is thwarted, the pattern becomes clear to Davenport. With an urgency born of rage and terror, he presses the hunt, desperately trying to track down the killers before they can strike again, before they can reach out for Davenport's own loved ones. But in this effort, he may already be too late.\u003cbr /\u003e\u003cbr /\u003eDid we mention? He thinks there's someone inside the department working for the other side. It's a tough one.&quot;},&quot;textReviewsCount&quot;:730,&quot;publicationDate&quot;:&quot;1996&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;6 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/1520707-sudden-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1348127756i/216131._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;216131&quot;,&quot;workId&quot;:&quot;1830020&quot;,&quot;bookUrl&quot;:&quot;/book/show/216131.Secret_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Secret Prey (Lucas Davenport, #9)&quot;,&quot;bookTitleBare&quot;:&quot;Secret Prey&quot;,&quot;numPages&quot;:416,&quot;avgRating&quot;:4.29,&quot;ratingsCount&quot;:30938,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;The company chairman lay dead in the woods, his or…&quot;,&quot;html&quot;:&quot;The company chairman lay dead in the woods, his orange hunting jacket punctured by a bullet at close range. Around him stood the four executives with whom he had been hunting, each with a reason not to be sorry about the man's death.\u003cbr /\u003e\u003cbr /\u003eA classic murder mystery, it would seem; the kind where the detective gathers everyone together at the end and solves the case. But Lucas Davenport knows it's not going to be easy. There are currents running through this group, hints and whispers of something much greater than the murder of a singl  the business - but things go wrong; by an amazing coincidence there's a witness. It's the shooting of the witness, a cop, that brings Deputy Chief Lucas Davenport into the case.\u003cbr /\u003e\u003cbr /\u003eLoan and Rinker must work together to clean up the loose ends - which includes getting Davenport off their backs by whatever means necessary.&quot;},&quot;textReviewsCount&quot;:914,&quot;publicationDate&quot;:&quot;1999&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;2 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/2315985-certain-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1348124039i/6838._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;6838&quot;,&quot;workId&quot;:&quot;1515166&quot;,&quot;bookUrl&quot;:&quot;/book/show/6838.Easy_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Easy Prey (Lucas Davenport, #11)&quot;,&quot;bookTitleBare&quot;:&quot;Easy Prey&quot;,&quot;numPages&quot;:480,&quot;avgRating&quot;:4.08,&quot;ratingsCount&quot;:22647,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;A Lucas Davenport thriller by internationally best…&quot;,&quot;html&quot;:&quot;A Lucas Davenport thriller by internationally bestselling novelist John Sandford.\u003cbr /\u003e\u003cbr /\u003eIn life she was a high-profile model. In death Alie'e Maison is the focus of a media firestorm that's demanding action from Lucas Davenport and the Minneapolis Police. Especially as one of his own men is a suspect in her murder.\u003cbr /\u003e\u003cbr /\u003eBut when a series of bizarre, seemingly unrelated slayings rock the city, Davenport suspects a connection that runs deeper than anyone has imagined - one that leads to an ingenious killer more ruthless than anyone had feared.&quot;},&quot;textReviewsCount&quot;:758,&quot;publicationDate&quot;:&quot;2000&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;66 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/1515166-easy-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1434789948i/14785._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;14785&quot;,&quot;workId&quot;:&quot;1652157&quot;,&quot;bookUrl&quot;:&quot;/book/show/14785.Chosen_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Chosen Prey (Lucas Davenport, #12)&quot;,&quot;bookTitleBare&quot;:&quot;Chosen Prey&quot;,&quot;numPages&quot;:383,&quot;avgRating&quot;:4.24,&quot;ratingsCount&quot;:32924,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;12 hours, 13 minutes \u003cbr/\u003e\u003cbr/\u003eLucas Davenport returns in th…&quot;,&quot;html&quot;:&quot;12 hours, 13 minutes \u003cbr /\u003e\u003cbr /\u003eLucas Davenport returns in the most harrowing and unexpected Prey novel yet - the story of a congenial man and his most uncongenial obsession....\u003cbr /\u003e\u003cbr /\u003eArt history professor James Qatar’s hobby was taking secret photographs of women. At night when he was all alone, he’d dream about them and indulge his fantasies. Then one day, his fantasy went too far. Now it’s Qatar’s turn to become an obsession - of Davenport’s. And for both men, there’s no turning back.&quot;},&quot;textReviewsCount&quot;:680,&quot;publicationDate&quot;:&quot;2001&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;66 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/1652157-chosen-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1421292490i/85310._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;85310&quot;,&quot;workId&quot;:&quot;3107820&quot;,&quot;bookUrl&quot;:&quot;/book/show/85310.Mortal_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Mortal Prey (Lucas Davenport, #13)&quot;,&quot;bookTitleBare&quot;:&quot;Mortal Prey&quot;,&quot;numPages&quot;:424,&quot;avgRating&quot;:4.27,&quot;ratingsCount&quot;:23507,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Years ago, Lucas Davenport almost died at the hand…&quot;,&quot;html&quot;:&quot;Years ago, Lucas Davenport almost died at the hands of Clara Rinker, a pleasant, soft-spoken, low-key Southerner, and the best hitwoman in the business.\u003cbr /\u003e\u003cbr /\u003eNow retired and living in Mexico, Clara nearly dies herself when a sniper kills her boyfriend, the son of a local drug lord. While the man's father vows vengeance, Rinker knows something he doesn't; his son wasn't the target, she was, and now she is going to have to disappear to find the killer herself.\u003cbr /\u003e\u003cbr /\u003eThe FBI and DEA draft Davenport to help track her down and, with his fiancée deep in wedding preparations, he's really happy to go. But he has no idea what he's getting into. Rinker is as unpredictable as ever, and between her old bosses in the St. Louis mob, the Mexican drug lord, and the combined, sometimes warring, forces of U.S. law enforcement, this is one case that will get more dangerous as it goes along. When the crossfire comes, anyone standing in the middle won't stand a chance! Filled with the rich characterization and exceptional drama that are his hallmarks, 'Mortal Prey' proves that John Sandford just keeps getting better.&quot;},&quot;textReviewsCount&quot;:789,&quot;publicationDate&quot;:&quot;2002&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;72 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/3107820-mortal-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1348906827i/168568._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;168568&quot;,&quot;workId&quot;:&quot;435188&quot;,&quot;bookUrl&quot;:&quot;/book/show/168568.Naked_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Naked Prey (Lucas Davenport, #14)&quot;,&quot;bookTitleBare&quot;:&quot;Naked Prey&quot;,&quot;numPages&quot;:455,&quot;avgRating&quot;:4.27,&quot;ratingsCount&quot;:23517,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Lucas Davenport finds some changes in store — and …&quot;,&quot;html&quot;:&quot;Lucas Davenport finds some changes in store — and a few of them are nasty — in this chilling novel by the number-one-bestselling author.\u003cbr /\u003e\u003cbr /\u003eAfter thirteen years and thirteen Prey novels, John Sandford's writing is as fresh as ever. His last book, \&quot;Mortal Prey,\&quot; was \&quot;a model of the genre\&quot; (People) and \&quot;the cop novel of the year\&quot; (Kirkus Reviews). In the words of the Washington Post: \&quot;John Sandford does everything right.\&quot;\u003cbr /\u003e\u003cbr /\u003eIn \&quot;Naked Prey,\&quot; he puts Davenport through change. His old boss, Rose Marie Roux, has moved up to the state level and taken Lucas with her. She creates a special troubleshooter job for him for cases that are too complicated or too politically touchy for others to handle. In addition, Lucas is married now and a new father, all of which is fine with him; he doesn't mind being a family man. But he is a little worried. For every bit of peace you get, you have to pay — and he's waiting for the bill.\u003cbr /\u003e\u003cbr /\u003eIt comes in the form of two people hanging from a tree in the woods of northern Minnesota. What makes the situation particularly sensitive is that the bodies are that of a black man and a white woman, and they're naked. \&quot;Lynching\&quot; is the word everybody's trying not to say — but, as Lucas begins to discover, the murders are nothing like what they appear. There's much worse coming.&quot;},&quot;textReviewsCount&quot;:795,&quot;publicationDate&quot;:&quot;2003&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;17 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/435188-naked-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1428363059i/888927._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;888927&quot;,&quot;workId&quot;:&quot;874176&quot;,&quot;bookUrl&quot;:&quot;/book/show/888927.Hidden_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Hidden Prey (Lucas Davenport, #15)&quot;,&quot;bookTitleBare&quot;:&quot;Hidden Prey&quot;,&quot;numPages&quot;:440,&quot;avgRating&quot;:4.13,&quot;ratingsCount&quot;:21465,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Theories abound when a Russian gets himself killed…&quot;,&quot;html&quot;:&quot;Theories abound when a Russian gets himself killed by the shore of Lake Superior near Duluth, Minnesota - shot with fifty-year-old bullets. \&quot;What's going on here?\&quot; When it turns out he had very high government connections back home, state troubleshooter Lucas Davenport gets the call. Well actually, Lucas and a mysterious Russian cop with secrets all her own. Together, they'll follow a trail back to another place and another time, and battle the shadows they discover there - shadows that turn out to be both very real and very deadly.\u003cbr /\u003e\u003cbr /\u003e\&quot;One of the strongest in Sandford's Prey series\&quot; says 'Entertainment Weekly.' \&quot;Good, dark, perverse, bloody fun,\&quot; adds 'The Washington Post Book World.'&quot;},&quot;textReviewsCount&quot;:707,&quot;publicationDate&quot;:&quot;2004&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;74 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/874176-hidden-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1388245666i/37300._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;37300&quot;,&quot;workId&quot;:&quot;4077284&quot;,&quot;bookUrl&quot;:&quot;/book/show/37300.Broken_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Broken Prey (Lucas Davenport, #16)&quot;,&quot;bookTitleBare&quot;:&quot;Broken Prey&quot;,&quot;numPages&quot;:481,&quot;avgRating&quot;:4.2,&quot;ratingsCount&quot;:22420,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;The first body, that of a young woman, is found on…&quot;,&quot;html&quot;:&quot;The first body, that of a young woman, is found on a Minneapolis riverbank, her throat cut, her body scourged and put on display. Lucas Davenport with the Minneapolis Bureau of Criminal Apprehension knows that whoever did this is pushed by brain chemistry. There is something wrong with him. This isn’t a love affair gone bad.\u003cbr /\u003e\u003cbr /\u003eThe second body is found three weeks later in a farmhouse six miles south. Same condition, same display—except this time it is a man. Nothing to link the two victims, nothing to indicate that the killings end here.\u003cbr /\u003e\u003cbr /\u003e“This guy…” Lucas says. He took a deep breath and let it out as a sigh. “This guy is going to bust our chops.” \u003cbr /\u003e\u003cbr /\u003eAnd soon he's going to do far worse than that…&quot;},&quot;textReviewsCount&quot;:813,&quot;publicationDate&quot;:&quot;2005&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;77 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/4077284-broken-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1442274826i/22411._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;22411&quot;,&quot;workId&quot;:&quot;1065728&quot;,&quot;bookUrl&quot;:&quot;/book/show/22411.Invisible_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Invisible Prey (Lucas Davenport, #17)&quot;,&quot;bookTitleBare&quot;:&quot;Invisible Prey&quot;,&quot;numPages&quot;:384,&quot;avgRating&quot;:4.19,&quot;ratingsCount&quot;:22884,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;In the richest neighborhood of Minneapolis, two el…&quot;,&quot;html&quot;:&quot;In the richest neighborhood of Minneapolis, two elderly women lie murdered in their home, killed with a pipe, the rooms ransacked and only small items stolen. It's clearly a random break-in by someone looking for money to buy drugs. But as he looks more closely, Lucas Davenport with the Minnesota Bureau of Criminal Apprehension begins to wonder if the items are actually so small or the victims so random, and whether there might not be some invisible agenda at work here.\u003cbr /\u003e\u003cbr /\u003eGradually, a pattern begins to emerge — and it will lead Davenport to somewhere he never expected. Which is too bad, because the killers — and yes, there are more than one — are expecting him.&quot;},&quot;textReviewsCount&quot;:866,&quot;publicationDate&quot;:&quot;2007&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;5 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/1065728-invisible-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1440350367i/2014625._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;2014625&quot;,&quot;workId&quot;:&quot;3185020&quot;,&quot;bookUrl&quot;:&quot;/book/show/2014625.Phantom_Prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Phantom Prey (Lucas Davenport, #18)&quot;,&quot;bookTitleBare&quot;:&quot;Phantom Prey&quot;,&quot;numPages&quot;:384,&quot;avgRating&quot;:4.05,&quot;ratingsCount&quot;:21579,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;A widow comes home to her large house in a wealthy…&quot;,&quot;html&quot;:&quot;A widow comes home to her large house in a wealthy Minneapolis suburb to find blood on the walls. But no body and her college-age daughter missing. She's always known that her daughter ran with a bad bunch. What did she call them — Goths? Freaks is more like it, running around with all that makeup and black clothing, listening to that awful music, so attracted to death. And now this.\u003cbr /\u003e\u003cbr /\u003eBut the police can't find her daughter, alive or dead, and she panics. There's someone she knows, a surgeon named Weather Davenport, whose husband is a big deal with the police, and she implores Weather to get her husband directly involved. Lucas comes on-board only reluctantly — but then when a second Goth is slashed to death, he starts working it hard. The clues don't seem to add up. And then there's the young Goth who keeps appearing and disappearing. Who is she? Where does she come from and, where does she vanish to?\u003cbr /\u003e\u003cbr /\u003eMost important, why does Lucas have the sneaking suspicion that there is something else going on here, something very bad indeed?&quot;},&quot;textReviewsCount&quot;:1054,&quot;publicationDate&quot;:&quot;2008&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;9 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/3185020-phantom-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1439318672i/5867331._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;5867331&quot;,&quot;workId&quot;:&quot;6686629&quot;,&quot;bookUrl&quot;:&quot;/book/show/5867331-wicked-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Wicked Prey (Lucas Davenport, #19)&quot;,&quot;bookTitleBare&quot;:&quot;Wicked Prey&quot;,&quot;numPages&quot;:402,&quot;avgRating&quot;:4.19,&quot;ratingsCount&quot;:21267,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Danger stalks Lucas Davenport at work and all too …&quot;,&quot;html&quot;:&quot;Danger stalks Lucas Davenport at work and all too close to home in the superlative thriller by the #1 New York Times bestselling author. For twenty years, John Sandford's novels have been beloved for their \&quot;ingenious plots, vivid characters, crisp dialogue and endless surprises\&quot; states The Washington Post, and nowhere are those more in evidence than in the sudden twists and shocks of Wicked Prey.\u003cbr /\u003e\u003cbr /\u003eThe Republicans are coming to St. Paul for their Presidential nomination convention. Throwing a big party is supposed to be fun, but crashing the party are a few hard cases the police would rather have stayed away. Chief among them is a crew of professional stickup men who've spotted several lucrative opportunities, ranging from political moneymen with briefcases full of cash to an armored-car warehouse with a weakness in its security system.\u003cbr /\u003e\u003cbr /\u003eAll that's headache enough for Lucas Davenport - but what's about to hit him is even worse. A while back, a stray bullet put a pimp and petty thief named Randy Whitcomb in a wheelchair and, ever since, the man has been nursing his grudge into a full head of psychotic steam. He blames Davenport for the bullet, but it's no fun just shooting him. That wouldn't be painful enough. Not when Davenport has a pretty fourteen-year-old adopted daughter named Letty that Whitcomb can target instead. . . . And then there's the young man with the .50 caliber sniper rifle and the right- wing-crazy background, roaming through a city filled with the most powerful politicians on earth. Good enough for you?&quot;},&quot;textReviewsCount&quot;:942,&quot;publicationDate&quot;:&quot;2009&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;68 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/6686629-wicked-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1272913373i/6878614._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;6878614&quot;,&quot;workId&quot;:&quot;7096036&quot;,&quot;bookUrl&quot;:&quot;/book/show/6878614-storm-prey&q t;:&quot;Buried Prey (Lucas Davenport, #21)&quot;,&quot;bookTitleBare&quot;:&quot;Buried Prey&quot;,&quot;numPages&quot;:390,&quot;avgRating&quot;:4.27,&quot;ratingsCount&quot;:40545,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;A house demolition provides an unpleasant surprise…&quot;,&quot;html&quot;:&quot;A house demolition provides an unpleasant surprise for Minneapolis-the bodies of two girls, wrapped in plastic. It looks like they've been there a long time. Lucas Davenport knows exactly how long. \u003cbr /\u003e\u003cbr /\u003e In 1985, Davenport was a young cop with a reputation for recklessness, and the girls' disappearance was a big deal. His bosses ultimately declared the case closed, but he never agreed with that. Now that he has a chance to investigate it all over again, one thing is becoming increasingly clear: It wasn't just the bodies that were buried. It was the truth.&quot;},&quot;textReviewsCount&quot;:1616,&quot;publicationDate&quot;:&quot;2011&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;47 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/14325072-buried-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1391798162i/13093001._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;13093001&quot;,&quot;workId&quot;:&quot;18154368&quot;,&quot;bookUrl&quot;:&quot;/book/show/13093001-stolen-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Stolen Prey (Lucas Davenport, #22)&quot;,&quot;bookTitleBare&quot;:&quot;Stolen Prey&quot;,&quot;numPages&quot;:402,&quot;avgRating&quot;:4.22,&quot;ratingsCount&quot;:28247,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Lucas Davenport has seen many terrible murder scen…&quot;,&quot;html&quot;:&quot;Lucas Davenport has seen many terrible murder scenes. This is one of the worst. In the small Minnesota town of Wayzata, an entire family has been killed—husband, wife, two daughters, dogs.\u003cbr /\u003e\u003cbr /\u003eThere’s something about the scene that pokes at Lucas’s cop instincts—it looks an awful lot like the kind of scorched-earth retribution he’s seen in drug killings sometimes. But this is a seriously upscale town, and the husband was an executive vice president at a big bank. It just doesn’t seem to fit.\u003cbr /\u003e\u003cbr /\u003eUntil it does. And where it leads Lucas will take him into the darkest nightmare of his life.&quot;},&quot;textReviewsCount&quot;:1365,&quot;publicationDate&quot;:&quot;2012&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;6 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/18154368-stolen-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1355077509i/16158527._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;16158527&quot;,&quot;workId&quot;:&quot;21998943&quot;,&quot;bookUrl&quot;:&quot;/book/show/16158527-silken-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Silken Prey (Lucas Davenport, #23)&quot;,&quot;bookTitleBare&quot;:&quot;Silken Prey&quot;,&quot;numPages&quot;:406,&quot;avgRating&quot;:4.23,&quot;ratingsCount&quot;:24778,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Very early one morning, a Minnesota political fixe…&quot;,&quot;html&quot;:&quot;Very early one morning, a Minnesota political fixer answers his doorbell. The next thing he knows, he’s waking up on the floor of a moving car, lying on a plastic sheet, his body wet with blood. When the car stops, a voice says, “Hey, I think he’s breathing,” and another voice says, “Yeah? Give me the bat.” And that’s the last thing he knows.\u003cbr /\u003e\u003cbr /\u003eDavenport is investigating another case when the trail leads to the man’s disappearance, then—very troublingly—to the Minneapolis police department, then—most troublingly of all—to a woman who could give Machiavelli lessons. She has very definite ideas about the way the world should work, and the money, ruthlessness, and sheer will to make it happen.\u003cbr /\u003e\u003cbr /\u003eNo matter who gets in the way.&quot;},&quot;textReviewsCount&quot;:1643,&quot;publicationDate&quot;:&quot;2012&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;1 edition&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/21998943-silken-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1382035214i/18667817._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;18667817&quot;,&quot;workId&quot;:&quot;26493480&quot;,&quot;bookUrl&quot;:&quot;/book/show/18667817-field-of-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Field of Prey (Lucas Davenport, #24)&quot;,&quot;bookTitleBare&quot;:&quot;Field of Prey&quot;,&quot;numPages&quot;:392,&quot;avgRating&quot;:4.29,&quot;ratingsCount&quot;:28392,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;The night after the fourth of July, Layton Carlson…&quot;,&quot;html&quot;:&quot;The night after the fourth of July, Layton Carlson Jr., of Red Wing, Minnesota, finally got lucky. And unlucky.\u003cbr /\u003e\u003cbr /\u003e He’d picked the perfect spot to lose his virginity to his girlfriend, an abandoned farmyard in the middle of cornfields: nice, private, and quiet. The only problem was . . . something smelled bad—like, \u003ci\u003ereally \u003c/i\u003ebad. He mentioned it to a county deputy he knew, and when the cop took a look, he found a body stuffed down a cistern. And then another, and another.\u003cbr /\u003e\u003cbr /\u003e By the time Lucas Davenport was called in, the police were up to fifteen bodies and counting. And as if that wasn’t bad enough, when Lucas began to investigate, he made some disturbing discoveries of his own. The victims had been killed over a great many years, one every summer, regular as clockwork. How could this have happened without anybody noticing?\u003cbr /\u003e\u003cbr /\u003e Because one thing was for sure: the killer had to live close by. He was probably even someone they saw every day. . . .&quot;},&quot;textReviewsCount&quot;:1899,&quot;publicationDate&quot;:&quot;2014&quot;,&quot;toBePublished&quot;:fa s finest forensic mind, the irascible and brilliant Lincoln Rhyme, and Lincoln’s partner Amelia Sachs, they set out to investigate the deaths of four young women, all illegal Mexicans, all of whom seem to be connected to the drug trade. The problem the killings may not be cartel hits—they may be carried out by corrupt cops looking to get information, and then silence the source. Or, as the veteran investigators will soon discover, they could be dealing with a very different kind of killer—and to draw him out, Lily and Amelia will have to pose as bait. For more exciting pairs, check out all eleven short stories in FaceOff!&quot;},&quot;textReviewsCount&quot;:91,&quot;publicationDate&quot;:&quot;2014&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;2 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/43488978-rhymes-with-prey-lincoln-rhyme-vs-lucas-davenport-lucas-davenport-2&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1417985559i/23281640._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;23281640&quot;,&quot;workId&quot;:&quot;42819638&quot;,&quot;bookUrl&quot;:&quot;/book/show/23281640-gathering-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Gathering Prey (Lucas Davenport, #25)&quot;,&quot;bookTitleBare&quot;:&quot;Gathering Prey&quot;,&quot;numPages&quot;:407,&quot;avgRating&quot;:4.24,&quot;ratingsCount&quot;:29272,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;A Lucas Davenport thriller from #1 New York Times …&quot;,&quot;html&quot;:&quot;A Lucas Davenport thriller from #1 New York Times bestselling author and Pulitzer Prize winner, John Sandford. It's terrifying.\u003cbr /\u003e\u003cbr /\u003eThey call them Travelers. They move from city to city, panhandling, committing no crimes—they just like to stay on the move. And now somebody is killing them.\u003cbr /\u003e\u003cbr /\u003eLucas Davenport’s adopted daughter, Letty, is home from college when she gets a call from a woman Traveler she befriended in San Francisco. The woman thinks somebody’s killing her friends and she’s afraid she might know who it is. Now her male companion has gone missing. She’s hiding out in North Dakota, and doesn’t know what to do.\u003cbr /\u003e\u003cbr /\u003eLetty tells Lucas she’s going to get the woman and, although he suspects Letty’s getting played, he volunteers to go with her. When he hears the woman’s story though, he begins to think there’s something in it. Little does he know that, in the days to come, he will embark upon an odyssey through a subculture unlike any he has ever seen, a trip that will not only put the he and Letty in danger—but just may change the course of his life.&quot;},&quot;textReviewsCount&quot;:1877,&quot;publicationDate&quot;:&quot;2015&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;27 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/42819638-gathering-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1438630553i/26025992._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;26025992&quot;,&quot;workId&quot;:&quot;45949484&quot;,&quot;bookUrl&quot;:&quot;/book/show/26025992-extreme-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Extreme Prey (Lucas Davenport, #26)&quot;,&quot;bookTitleBare&quot;:&quot;Extreme Prey&quot;,&quot;numPages&quot;:406,&quot;avgRating&quot;:4.31,&quot;ratingsCount&quot;:27091,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;An extraordinary Lucas Davenport thriller from #1 …&quot;,&quot;html&quot;:&quot;An extraordinary Lucas Davenport thriller from #1 \&quot;New York Times\&quot; bestselling author and Pulitzer Prize winner John Sandford.\u003cbr /\u003e\u003cbr /\u003eAfter the events in \&quot;Gathering Prey\&quot;, Lucas Davenport finds himself in a very unusual situation—no longer employed by the Minnesota BCA. His friend the governor is just cranking up a presidential campaign though, and he invites Lucas to come along as part of his campaign staff. “Should be fun!” he says, and it kind of is—until they find they have a shadow: an armed man intent on killing the governor . . . and anyone who gets in the way.&quot;},&quot;textReviewsCount&quot;:1745,&quot;publicationDate&quot;:&quot;2016&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;2 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/45949484-extreme-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1471281757i/31379212._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;31379212&quot;,&quot;workId&quot;:&quot;52068093&quot;,&quot;bookUrl&quot;:&quot;/book/show/31379212-golden-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Golden Prey (Lucas Davenport, #27)&quot;,&quot;bookTitleBare&quot;:&quot;Golden Prey&quot;,&quot;numPages&quot;:393,&quot;avgRating&quot;:4.31,&quot;ratingsCount&quot;:26806,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003e\u003ci\u003eThe man was smart and he didn’t mind killing peopl…\u003c/i\u003e\u003c/b\u003e&quot;,&quot;html&quot;:&quot;\u003cb\u003e\u003ci\u003eThe man was smart and he didn’t mind killing people. Welcome to the big leagues, Davenport.\u003c/i\u003e Lucas Davenport’s first case as a U.S. Marshal sends him into uncharted territory, in the thrilling new novel in the #1 New York Times-bestselling series.\u003c/b\u003e\u003cbr /\u003e \u003cbr /\u003e Thanks to some very influential people whose lives he saved, Lucas is no longer working for the Minnesota Bureau of Criminal Apprehension, but for the U.S. Marshals Service, and with unusual scope. He gets to pick his own cases, whatever they are, wherever they lead him.\u003cbr /\u003e\u003cbr /\u003e And where they’ve led him this time is into real trouble. A Biloxi, Mississippi, drug-cartel counting house gets robbed, and suitcases full of cash disappear, leaving behind five bodies, including that of a six-year-old girl. Davenport takes the case, which quickly spirals out of control, as cartel assassins, including a torturer known as the “Queen of home-improvement tools” compete with Davenport to find the Dixie Hicks shooters who knocked over the counting house. Things get ugly real fast, and neither the cartel killers nor the holdup men give a damn about whose lives Davenport might have saved; to them, he’s just another large target.&quot;},&quot;textReviewsCount&quot;:1944,&quot;publicationDate&quot;:&quot;2017&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;27 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/52068093-golden-prey-lucas-davenport-27&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1504364758i/36168749._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;36168749&quot;,&quot;workId&quot;:&quot;57741503&quot;,&quot;bookUrl&quot;:&quot;/book/show/36168749-twisted-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Twisted Prey (Lucas Davenport, #28)&quot;,&quot;bookTitleBare&quot;:&quot;Twisted Prey&quot;,&quot;numPages&quot;:395,&quot;avgRating&quot;:4.38,&quot;ratingsCount&quot;:26292,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Lucas Davenport confronts an old nemesis, now more…&quot;,&quot;html&quot;:&quot;Lucas Davenport confronts an old nemesis, now more powerful than ever, in this thrilling addition to the #1 'New York Times' bestselling Prey series. She's now a U.S. Senator. Lucas had crossed paths with her before.\u003cbr /\u003e\u003cbr /\u003eA rich psychopath, Taryn Grant had run successfully for the U.S. Senate, where Lucas had predicted she'd fit right in. He was also convinced that she'd been responsible for three murders, though he'd never been able to prove it. Once a psychopath gets that kind of rush though, he or she often needs another fix, and Davenport figured he might be seeing Taryn Grant again.\u003cbr /\u003e\u003cbr /\u003eHe was right. A federal marshal now, with a very wide scope of investigation, he's heard rumors that Grant has found her seat on the Senate intelligence committee, and the contacts she's made from it, to be very...useful. Pinning those rumors down was likely to be just as difficult as before, and considerably more dangerous.\u003cbr /\u003e\u003cbr /\u003eBut they had unfinished business, Davenport and Grant. One way or the other, he was going to see it through to the end.&quot;},&quot;textReviewsCount&quot;:1721,&quot;publicationDate&quot;:&quot;2018&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;1 edition&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/57741503-twisted-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1532908075i/40982957._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;40982957&quot;,&quot;workId&quot;:&quot;63872958&quot;,&quot;bookUrl&quot;:&quot;/book/show/40982957-neon-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Neon Prey (Lucas Davenport, #29)&quot;,&quot;bookTitleBare&quot;:&quot;Neon Prey&quot;,&quot;numPages&quot;:400,&quot;avgRating&quot;:4.19,&quot;ratingsCount&quot;:25216,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Lucas Davenport pursues a prolific serial killer w…&quot;,&quot;html&quot;:&quot;Lucas Davenport pursues a prolific serial killer who has gone undetected for years in this nail-biter by #1 'New York Times' bestselling author John Sandford.\u003cbr /\u003e\u003cbr /\u003eIt was a relatively minor criminal matter, all things considered, but enough that the U.S. Marshals obtained a warrant to enter the home. They didn't expect to unearth trophies from a score of killings.\u003cbr /\u003e\u003cbr /\u003eNow Davenport is on the trail of a serial murderer, one who was able to operate for years without notice or suspicion. But there's even more to this killer than meets the eye...&quot;},&quot;textReviewsCount&quot;:1761,&quot;publicationDate&quot;:&quot;2019&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;4 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/63872958-neon-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1567045656l/52752171._SX120_SY180_.jpg&quot;,&quot;bookId&quot;:&quot;52752171&quot;,&quot;workId&quot;:&quot;73003429&quot;,&quot;bookUrl&quot;:&quot;/book/show/52752171-masked-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Masked Prey (Lucas Davenport, #30)&quot;,&quot;bookTitleBare&quot;:&quot;Masked Prey&quot;,&quot;numPages&quot;:416,&quot;avgRating&quot;:4.17,&quot;ratingsCount&quot;:25928,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Lucas Davenport investigates a vitriolic blog that…&quot;,&quot;html&quot;:&quot;Lucas Davenport investigates a vitriolic blog that seems to be targeting the children of U.S. politicians in this baffling thriller by #1 New York Times-bestselling author John Sandford.\u003cbr /\u003e\u003cbr /\u003eThe daughter of a U.S. Senator is monitoring her social media presence when she finds a picture of herself on a strange blog. And there are other pictures . . . of the children of other influential Washington politicians, walking or standing outside their schools, each identified by name. Surrounding the photos are texts of vicious political rants from a motley variety of radical groups. \u003cbr /\u003e\u003cbr /\u003eIt's obviously alarming. Is there an unstable extremist tracking the loved ones of powerful politicians with deadly intent? But when the FBI is called in, there isn't much the feds can do. The anonymous photographer can't be pinned down to one location or IP address, and more importantly, at least to the paper-pushing bureaucrats, no crime has actually been committed. With nowhere else to turn, influential Senators decide to call in someone who can operate outside the FBI's constraints: Lucas Davenport.&quot;},&quot;textReviewsCount&quot;:1715,&quot;publicationDate&quot;:&quot;2020&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;3 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/73003429-masked-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1596043900i/54747051._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;54747051&quot;,&quot;workId&quot;:&quot;85401430&quot;,&quot;bookUrl&quot;:&quot;/book/show/54747051-ocean-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Ocean Prey (Lucas Davenport #31, Virgil Flowers #13)&quot;,&quot;bookTitleBare&quot;:&quot;Ocean Prey&quot;,&quot;numPages&quot;:431,&quot;avgRating&quot;:4.38,&quot;ratingsCount&quot;:37616,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;An off-duty Coast Guardsman is fishing with his fa…&quot;,&quot;html&quot;:&quot;An off-duty Coast Guardsman is fishing with his family in the Atlantic just off south Florida when he sees, and then calls in, some suspicious behavior in a nearby boat. It's a snazzy craft, slick and outfitted with extra horsepower, and is zipping along until it slows to pick up a surfaced diver . . . a diver who was apparently alone, without his own boat, in the middle of the ocean. None of it makes sense unless there's something hinky going on, and his hunch is proven correct when all three Guardsmen who come out to investigate are shot and killed.\u003cbr /\u003e\u003cbr /\u003eThey're federal officers killed on the job, which means the case is the FBI's turf. When the FBI's investigation stalls out, Lucas Davenport of the U.S. Marshals Service gets a call. The case turns even more lethal and Davenport needs to bring in every asset he can find, including a detective with a fundamentally criminal mind: Virgil Flowers.&quot;},&quot;textReviewsCount&quot;:2299,&quot;publicationDate&quot;:&quot;2021&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;1 edition&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/85401430-ocean-prey-lucas-davenport-31-virgil-flowers-13&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1641696124i/60067154._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;60067154&quot;,&quot;workId&quot;:&quot;94717702&quot;,&quot;bookUrl&quot;:&quot;/book/show/60067154-righteous-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Righteous Prey (Lucas Davenport #32, Virgil Flowers #14)&quot;,&quot;bookTitleBare&quot;:&quot;Righteous Prey&quot;,&quot;numPages&quot;:416,&quot;avgRating&quot;:4.4,&quot;ratingsCount&quot;:29819,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Lucas Davenport and Virgil Flowers are up against …&quot;,&quot;html&quot;:&quot;Lucas Davenport and Virgil Flowers are up against a powerful vigilante group with an eye on vengeance in this stunning new novel from the #1 'New York Times' bestselling author John Sandford.\u003cbr /\u003e\u003cbr /\u003e“We’re going to murder people who need to be murdered.” \u003cbr /\u003e\u003cbr /\u003eSo begins a press release from a mysterious group known only as 'The Five,' shortly after a vicious predator is murdered in San Francisco. The Five is made up of vigilante killers who are very bored…and very rich. They target the worst of society—rapists, murderers, and thieves—and then use their unlimited resources to offset the damage done by those who they’ve killed, donating untraceable Bitcoins to charities and victims via the dark net. The Five soon become popular figures in the media …though their motives may not be entirely pure.\u003cbr /\u003e\u003cbr /\u003eAfter The Five strike again in the Twin Cities, Virgil Flowers and Lucas Davenport are sent in to investigate. And they soon have their hands full--the killings are smart and carefully choreographed. With no apparent direct connection to the victims, the killers are virtually untraceable. But if anyone can destroy this group, it will be the dynamic team of Davenport and Flowers.&quot; enly turn to his grieving widow, Margaret Cooper, to see what she might do with the money. Margaret, distraught over the death of her family, struggles to move forward, and can’t imagine how or why anyone would target her husband.\u003cbr /\u003e\u003cbr /\u003eWith public pressure mounting and both the local police and the FBI hitting dead end after dead end, Lucas Davenport and Virgil Flowers are called in to do what others could not: find answers. Each of their potential leads has flaws, but they are determined to chase every theory until they figure out who killed the Sands. When they find themselves being stonewalled by the most unlikely of forces, the two wonder if perhaps each misdirection could lead them closer to the truth.&quot;},&quot;textReviewsCount&quot;:1424,&quot;publicationDate&quot;:&quot;2023&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;1 edition&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/101040440-judgment-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1702053213i/195769180._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;195769180&quot;,&quot;workId&quot;:&quot;194643705&quot;,&quot;bookUrl&quot;:&quot;/book/show/195769180-toxic-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Toxic Prey (Lucas Davenport, #34, Letty Davenport, #3)&quot;,&quot;bookTitleBare&quot;:&quot;Toxic Prey&quot;,&quot;numPages&quot;:400,&quot;avgRating&quot;:4.4,&quot;ratingsCount&quot;:26035,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Lucas Davenport and his daughter, Letty, team up t…&quot;,&quot;html&quot;:&quot;Lucas Davenport and his daughter, Letty, team up to track down a dangerous scientist whose latest project could endanger the entire world, in this thriller from #1 New York Times bestselling author, John Sandford.\u003cbr /\u003e\u003cbr /\u003eGaia is dying.\u003cbr /\u003e\u003cbr /\u003eThat, at least, is what Dr. Lionel Scott believes. A renowned expert in tropical and infectious diseases, Scott has witnessed the devastating impact of illness and turmoil at a critical scale. He is certain that society as it exists is untenable and is directly linked to Earth’s death spiral; population levels are out of control and people have allowed disarray and disorder to run rampant. While most are concerned about deadly disease, Scott knows that it is truly humanity itself that will destroy Gaia. His conclusion? It’s only by removing this threat that the planet can continue to prosper, and luckily, Scott is just the right man for the job!\u003cbr /\u003e\u003cbr /\u003eWhen Scott disappears without a trace, Letty Davenport is tasked with tracking down any and all leads. Scott’s connections to sensitive research into virus and pathogen spread has multiple national and international organizations on high alert, and his shockingly high clearance levels at various institutions, including the Los Alamos National Laboratory, make him the last person they’d like to go missing.\u003cbr /\u003e\u003cbr /\u003eAs the web around Scott becomes more tangled, Letty calls in her father, Lucas, to help her find Scott ASAP. But soon their worst fears are confirmed, and it quickly becomes a race to find him before the virus he created becomes the perfect weapon.&quot;},&quot;textReviewsCount&quot;:1629,&quot;publicationDate&quot;:&quot;2024&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;10 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/194643705-toxic-prey-lucas-davenport-34-letty-davenport-3&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1720580142i/216310255._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;216310255&quot;,&quot;workId&quot;:&quot;222657695&quot;,&quot;bookUrl&quot;:&quot;/book/show/216310255-lethal-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Lethal Prey (Lucas Davenport #35; Virgil Flowers #16)&quot;,&quot;bookTitleBare&quot;:&quot;Lethal Prey&quot;,&quot;numPages&quot;:391,&quot;avgRating&quot;:4.21,&quot;ratingsCount&quot;:21735,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/4610.John_Sandford&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/4610.John_Sandford&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003eLucas Davenport and Virgil Flowers join forces to …\u003c/b\u003e&quot;,&quot;html&quot;:&quot;\u003cb\u003eLucas Davenport and Virgil Flowers join forces to track down a ruthless killer who will do whatever it takes to keep the past buried.\u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003eDoris Grandfelt, an employee at an accounting firm, was brutally stabbed to death . . . but nobody knew exactly where the crime took place. Her body was found the next night, dumped among a dense thicket of trees along the edge of an urban park, eight miles east of St. Paul, Minnesota. Despite her twin sister Lara Grandfelt’s persistent calls to the Bureau of Criminal Apprehension, the killer was never found.\u003cbr /\u003e\u003cbr /\u003eTwenty years later, Lara has been diagnosed with breast cancer. Confronted with the possibility of her own death, she’s determined to find Doris’s killer once and for all. Finally taking matters into her own hands, she dumps the entire investigative file on every true-crime site in the world and offers a $5 million reward for information leading to the killer’s arrest. Dozens of true-crime bloggers show up looking for both new evidence and “clicks,” and Lucas Davenport and Virgil Flowers are called in to review anything that might be a new lead.\u003cbr /\u003e\u003cbr /\u003eWhen one of the bloggers locates the murder weapon, Lucas and Virgil begin to uncover vital details about the killer’s identity. But what they don’t know is the killer lurks in plain sight, and with the true-crime bloggers blasting every clue online, the killer can keep one step ahead. As the nation maneuvers the detectives closer to the truth, Lucas and Virgil will find that digging up Doris’s harrowing past might just get them buried instead.&quot;},&quot;textReviewsCount&quot;:1540,&quot;publicationDate&quot;:&quot;2025&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;9 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/222657695-lethal-prey&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1767833525i/238228541._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;238228541&quot;,&quot;workId&quot;:&quot;254152332&quot;,&quot;bookUrl&quot;:&quot;/book/show/238228541-revenge-prey&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Revenge Prey (Lucas Davenport #36)&quot;,&quot;bookTitleBare&quot;:&quot;Revenge Prey&quot;,&quot;numPages&quot;:400,&quot;avgRating&quot;:4.45,&quot;ratingsCount&quot;:13539,&quot;author&quot;:{&quot;id&quot;:4610,&quot;name&quot;:&quot;John Sandford&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www enport\u003c/i\u003e series, featuring Minneapolis homicide investigator Lucas Davenport.\u003cbr /\u003e\u003cbr /\u003eNIGHT PREY\u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003eA savage psychopath is playing cat and mouse with Lucas Davenport. But both killer and detective find themselves at odds with a female investigator who has intensely personal reasons for catching the killer herself—and fast.\u003cbr /\u003e\u003cbr /\u003e\u003cb\u003eMIND PREY \u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003eLucas Davenport has met his match—a nemesis more intelligent, and more depraved, than any he has tracked before. A pure, wanton killer who knows more about mind games than Lucas himself—and with a female psychiatrist already in his trap, he’s one step ahead.\u003cbr /\u003e\u003cbr /\u003e\u003cb\u003eSUDDEN PREY \u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003eThe crime spree should have ended when Lucas Davenport killed the female bank robber during the shoot-out. But it’s just beginning, because the woman’s husband isn’t about to let Lucas—or anyone he loves—escape retribution.\u003cbr /\u003e\u003cbr /\u003e\u003cb\u003eSECRET PREY \u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003eWhen a wealthy banker is shot dead during a hunting trip, Lucas Davenport's routine murder investigation turns into a cat-and-mouse game with a killer who won't hesitate to take the fight to Lucas himself. And those he loves…\u003cbr /\u003e\u003cbr /\u003e\u003cb\u003eCERTAIN PREY \u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003eA wealthy socialite has been murdered. Now the killer must tie up a few loose ends. One is the witness. The other is Lucas Davenport—and of all the criminals Davenport has hunted, none has been as efficient or as ferociously intelligent as the woman who’s hunting him.&quot;},&quot;textReviewsCount&quot;:7,&quot;publicationDate&quot;:&quot;2012&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;2 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/22630020-
