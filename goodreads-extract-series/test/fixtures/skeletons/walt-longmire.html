amboat&quot;,&quot;numPages&quot;:146,&quot;avgRating&quot;:4.29,&quot;ratingsCount&quot;:10330,&quot;author&quot;:{&quot;id&quot;:63607,&quot;name&quot;:&quot;Craig Johnson&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/63607.Craig_Johnson&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/63607.Craig_Johnson&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;A Christmas novella for fans of the hit drama seri…&quot;,&quot;html&quot;:&quot;A Christmas novella for fans of the hit drama series LONGMIRE now on Netflix and the New York Times –bestselling series. \u003cbr /\u003e\u003cbr /\u003eCraig Johnson's new novel , The Western Star,  will be available from Viking in Fall 2017.\u003cbr /\u003e\u003cbr /\u003eSheriff Walt Longmire is in his office reading A Christmas Carol when he is interrupted by a ghost of Christmas a young woman with a hairline scar and more than a few questions about his predecessor, Lucian Connally. With his daughter Cady and undersherrif Moretti otherwise engaged, Walt’s on his own this Christmas Eve, so he agrees to help her.\u003cbr /\u003e\u003cbr /\u003eAt the Durant Home for Assisted Living, Lucian is several tumblers into his Pappy Van Winkle’s and swears he’s never clapped eyes on the woman before. Disappointed, she whispers “Steamboat” and begins a story that takes them all back to Christmas Eve 1988—a story that will thrill and delight the bestselling series’ devoted fans.&quot;},&quot;textReviewsCount&quot;:1012,&quot;publicationDate&quot;:&quot;2013&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;20 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/24678734-spirit-of-steamboat&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1392024926i/18693828._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;18693828&quot;,&quot;workId&quot;:&quot;26542378&quot;,&quot;bookUrl&quot;:&quot;/book/show/18693828-any-other-name&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Any Other Name (Walt Longmire, #10)&quot;,&quot;bookTitleBare&quot;:&quot;Any Other Name&quot;,&quot;numPages&quot;:317,&quot;avgRating&quot;:4.25,&quot;ratingsCount&quot;:15271,&quot;author&quot;:{&quot;id&quot;:63607,&quot;name&quot;:&quot;Craig Johnson&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/63607.Craig_Johnson&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/63607.Craig_Johnson&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003eA sheriff’s mysterious death spurs the new novel i…\u003c/b\u003e&quot;,&quot;html&quot;:&quot;\u003cb\u003eA sheriff’s mysterious death spurs the new novel in the \u003ci\u003eNew York Times\u003c/i\u003e bestselling\u003c/b\u003e\u003cb\u003e Walt Longmire series\u003c/b\u003e\u003cbr /\u003e \u003cbr /\u003e Sheriff Walt Longmire had already rounded up a sizable posse of devoted readers when the A\u0026amp;E television series Longmire sent the Wyoming lawman’s popularity skyrocketing. Now, with three consecutive \u003ci\u003eNew York Times\u003c/i\u003e bestsellers to his name and the second season of \u003ci\u003eLongmire\u003c/i\u003e reaching an average of 5.4 million viewers per episode, Craig Johnson is reaching a fan base that is both fiercely loyal and ever growing.\u003cbr /\u003e \u003cbr /\u003e In \u003ci\u003eAny Other Name\u003c/i\u003e, Walt is sinking into high-plains winter discontent when his former boss, Lucian Conally, asks him to take on a mercy case in an adjacent county. Detective Gerald Holman is dead and Lucian wants to know what drove his old friend to take his own life.
