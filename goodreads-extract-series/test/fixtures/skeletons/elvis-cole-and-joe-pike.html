olition Angel\u003c/i\u003e, Robert Crais drew raves for his unstoppable pacing, edgy characterizations, and cinematic prose. Now, in \u003ci\u003eThe Last Detective\u003c/i\u003e, Crais returns to his signature character, Los Angeles private investigator Elvis Cole, in a masterful page-turner that probes the meaning of family and the burdens of the past.\u003cbr /\u003e\u003cbr /\u003eLos Angeles, 3:58 A.M.: Elvis Cole receives the phone call he's been waiting for since childhood. Responding to a gunshot, the LAPD has found an injured man in an alleyway. He has told the officer on the scene that he is looking for his son, Elvis Cole. Minutes later, the man is dead.\u003cbr /\u003e\u003cbr /\u003eHaunted throughout his life by a lack of knowledge about his father, Elvis turns to the one person who can help him navigate the minefield of his past - his longtime partner and confidant, Joe Pike. Together with hard-edged LAPD detective Carol Starkey (who is harboring her own growing feelings for Cole), they launch a feverish search for the dead man's identity. Elvis, meanwhile, struggles between wanting to believe he's found his father at last and allowing his suspicions to hold him back. With each long-buried clue they unearth, a frightening picture begins to emerge about who the dead man might have been - and the terrible secret he's been guarding.\u003cbr /\u003e\u003cbr /\u003e At the same time, Elvis has no way of knowing he has awakened a sleeping monster. The further he goes in his investigation, the closer he draws to a merciless killer who is violently connected to the unidentified man's past. This psychopath believes Cole is hunting him, and he goes on the attack to find Elvis before Elvis can find him.&quot;},&quot;textReviewsCount&quot;:667,&quot;publicationDate&quot;:&quot;2005&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;3 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/452579-the-forgotten-man&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1442928221i/57951._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;57951&quot;,&quot;workId&quot;:&quot;814176&quot;,&quot;bookUrl&quot;:&quot;/book/show/57951.The_Watchman&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The Watchman (Elvis Cole, #11; Joe Pike, #1)&quot;,&quot;bookTitleBare&quot;:&quot;The Watchman&quot;,&quot;numPages&quot;:304,&quot;avgRating&quot;:4.15,&quot;ratingsCount&quot;:28785,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;To pay back an old debt, Pike is coerced into prot…&quot;,&quot;html&quot;:&quot;To pay back an old debt, Pike is coerced into protecting Larkin Barkley, a hard-partying young heiress whose life is in danger after a \&quot;wrong place wrong time\&quot; encounter that quickly escalates and spins out of control. The enemy is shadowy, violent and relentless—but the fierce, focused Pike, one of the strongest characters in modern crime fiction, is equal to the challenge. The breathless pace and rich styling are sure to appeal to readers of hard-boiled fiction in general, but since up to now Pike has mostly remained in the background, some fans of the Elvis Cole series (The Forgotten Man, etc.) may find the explicit picture that emerges of Pike at odds with the image they've constructed for themselves.&quot;},&quot;textReviewsCount&quot;:1314,&quot;publicationDate&quot;:&quot;2007&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;100 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/814176-the-watchman&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1432086419i/1689469._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;1689469&quot;,&quot;workId&quot;:&quot;1686300&quot;,&quot;bookUrl&quot;:&quot;/book/show/1689469.Chasing_Darkness&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Chasing Darkness (Elvis Cole, #12)&quot;,&quot;bookTitleBare&quot;:&quot;Chasing Darkness&quot;,&quot;numPages&quot;:288,&quot;avgRating&quot;:4.24,&quot;ratingsCount&quot;:20462,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Elvis Cole is Back--In a Desperate Fight to Clear …&quot;,&quot;html&quot;:&quot;Elvis Cole is Back--In a Desperate Fight to Clear his Name... It's fire season, and the hills of Los Angeles are burning. When police and fire department personnel rush door to door in a frenzied evacuation effort, they discover the week-old corpse of an apparent suicide. But the gunshot victim is less gruesome than what they find in his lap: a photo album of seven brutally murdered young women -- one per year, for seven years. And when the suicide victim is identified as a former suspect in one of the murders, the news turns Elvis Cole's world upside down.\u003cp\u003eThree years earlier Lionel Byrd was brought to trial for the murder of a female prostitute named Yvonne Bennett. A taped confession coerced by the police inspired a prominent defense attorney to take Byrd's case, and Elvis Cole was hired to investigate. It was Cole's eleventh-hour discovery of an exculpatory videotape that allowed Lionel Byrd to walk free. Elvis was hailed as a hero.\u003c/p\u003e\u003cp\u003eBut the discovery of the death album in Byrd's lap now brands Elvis as an unwitting accomplice to murder. Captured in photographs that could only have been taken by the murderer, Yvonne Bennett was the fifth of the seven victims -- two more young women were murdered after Lionel Byrd walked free. So Elvis can't help but wonder -- did he, Elvis Cole, cost two more young women their lives?\u003c/p\u003e\u003cp\u003eShut out of the investigation by a special LAPD task force determined to close the case, Elvis Cole and Joe Pike desperately fight to uncover the truth about Lionel Byrd and his nightmare album of death -- a truth hidden by lies, politics, and corruption in a world where nothing is what it seems to be.\u003c/p\u003e\u003cp\u003e\&quot;Chasing Darkness\&quot; is a blistering thriller from the bestselling author who sets the standard for intense, powerful crime writing.\u003c/p\u003e&quot;},&quot;textReviewsCount&quot;:962,&quot;publicationDate&quot;:&quot;2008&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;68 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/1686300-chasing-darkness&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1442546114i/6574542._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;6574542&quot;,&quot;workId&quot;:&quot;6767675&quot;,&quot;bookUrl&quot;:&quot;/book/show/6574542-the-first-rule&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The First Rule (Elvis Cole, #13; Joe Pike, #2)&quot;,&quot;bookTitleBare&quot;:&quot;The First Rule&quot;,&quot;numPages&quot;:308,&quot;avgRating&quot;:4.25,&quot;ratingsCount&quot;:24814,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;When Frank Meyer and his family are executed in th…&quot;,&quot;html&quot;:&quot;When Frank Meyer and his family are executed in their home, the police begin investigating the secret life they're sure Meyer had. Joe Pike's on a hunt of his own: to clear his friend's name, and to punish the people who murdered him. What starts out as a simple trail gets twisted fast by old grudges, double crosses, blood vengeance, and a crime so terrible even Pike and his partner Elvis Cole have no way to measure it.\u003cbr /\u003e\u003cbr /\u003e \u003cbr /\u003e&quot;},&quot;textReviewsCount&quot;:1158,&quot;publicationDate&quot;:&quot;2010&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;69 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/6767675-the-first-rule&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1438489020i/8805443._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;8805443&quot;,&quot;workId&quot;:&quot;13088275&quot;,&quot;bookUrl&quot;:&quot;/book/show/8805443-the-sentry&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The Sentry (Elvis Cole, #14; Joe Pike, #3)&quot;,&quot;bookTitleBare&quot;:&quot;The Sentry&quot;,&quot;numPages&quot;:306,&quot;avgRating&quot;:4.24,&quot;ratingsCount&quot;:23591,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Dru Rayne and her uncle fled to L.A. after Hurrica…&quot;,&quot;html&quot;:&quot;Dru Rayne and her uncle fled to L.A. after Hurricane Katrina; but now, five years later, they face a different danger. When Joe Pike witnesses Dru's uncle beaten by a protection gang, he offers his help, but neither of them want it -- and neither do the federal agents mysteriously watching them.\u003cbr /\u003e\u003cbr /\u003eAs the level of violence escalates, and Pike himself becomes a target, he and Elvis Cole learn that Dru and her uncle are not who they seem -- and that everything he thought he knew about them has been a lie. A vengeful and murderous force from their past is now catching up to them... and only Pike and Cole stand in the way.&quot;},&quot;textReviewsCount&quot;:1181,&quot;publicationDate&quot;:&quot;2011&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;9 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/13088275-the-sentry&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1315773532i/11889938._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;11889938&quot;,&quot;workId&quot;:&quot;16848889&quot;,&quot;bookUrl&quot;:&quot;/book/show/11889938-taken&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Taken (Elvis Cole, #15; Joe Pike, #4)&quot;,&quot;bookTitleBare&quot;:&quot;Taken&quot;,&quot;numPages&quot;:341,&quot;avgRating&quot;:4.23,&quot;ratingsCount&quot;:21398,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;When Nita Morales hires Elvis Cole to find her mis…&quot;,&quot;html&quot;:&quot;When Nita Morales hires Elvis Cole to find her missing adult daughter, she isn’t afraid, even though she’s gotten a phone call asking for ransom. She knows it’s a fake, that her daughter is off with the guy Nita will only call \&quot;that boy,\&quot; and that they need money: \&quot;Even smart girls do stupid things when they think a boy loves them.\&quot;\u003cp\u003eBut Nita is wrong. The girl and her boyfriend have been taken by bajadores – bandits who prey on other bandits, border professionals who prey not only on innocent victims, but on each other. They steal drugs, guns, and people – buying and selling victims like commodities, and killing the ones they can’t get a price for.\u003c/p\u003e\u003cp\u003eElvis Cole and Joe Pike find the spot where they were taken. There are tire tracks, bullet casings, and bloodstains. They know things look as bad as possible. But they are wrong, too. It is about to get worse. Going undercover to find the two young people and buy them back, Cole himself is taken, and now it is up to Joe Pike to retrace Cole’s steps, burning through the hard and murderous world of human traffickers to find his friend.\u003c/p\u003e\u003cp\u003eBut he may already be too late..\u003c/p\u003e&quot;},&quot;textReviewsCount&quot;:1235,&quot;publicationDate&quot;:&quot;2012&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;4 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/16848889-taken&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1447138745i/22169495._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;22169495&quot;,&quot;workId&quot;:&quot;41511022&quot;,&quot;bookUrl&quot;:&quot;/book/show/22169495-the-promise&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The Promise (Elvis Cole, #16; Joe Pike, #5; Scott James \u0026 Maggie, #2)&quot;,&quot;bookTitleBare&quot;:&quot;The Promise&quot;,&quot;numPages&quot;:408,&quot;avgRating&quot;:4.27,&quot;ratingsCount&quot;:19284,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003e\n  \u003ci\u003eElvis Cole and Joe Pike are joined by Suspect h…\u003c/i\u003e\u003c/b\u003e&quot;,&quot;html&quot;:&quot;\u003cb\u003e\n  \u003ci\u003eElvis Cole and Joe Pike are joined by Suspect heroes LAPD K-9 Officer Scott James and his German shepherd, Maggie, in the new heart-stopping thriller from #1 New York Times-bestselling author Robert Crais.\u003c/i\u003e\n\u003c/b\u003e\u003cbr /\u003e\u003cbr /\u003eLoyalty, commitment, and the fight for justice have always driven Elvis Cole and Joe Pike. If they make a promise, they keep it. Even if it could get them killed.\u003cbr /\u003e \u003cbr /\u003eWhen Elvis Cole is secretly hired to find a grief-stricken mother, he’s led to an ordinary house on a rainy night in Echo Park. Only the house isn’t ordinary, and the people hiding inside are a desperate fugitive and a murderous criminal with his own dangerous secrets.\u003cbr /\u003e\u003cbr /\u003eAs helicopters swirl overhead, Scott and Maggie track the fugitive to this same house, coming face-to-face with Mr. Rollins, a killer who leaves behind a brutally murdered body and enough explosives to destroy the neighborhood. Scott is now the only person who can identify him, but Mr. Rollins has a rule: Never leave a witness alive.\u003cbr /\u003e\u003cbr /\u003eFor all of them, the night is only beginning.\u003cbr /\u003e\u003cbr /\u003eSworn to secrecy by his client, Elvis finds himself targeted by the police even as Mr. Rollins targets Maggie and Scott. As Mr. Rollins closes in for the kill, Elvis and Joe join forces with Scott and Maggie to follow a trail of lies where no one is who they claim — and the very woman they promised to save might get them all killed.&quot;},&quot;textReviewsCount&quot;:1593,&quot;publicationDate&quot;:&quot;2015&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;45 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/41511022-the-promise&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1475724768i/32479256._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;32479256&quot;,&quot;workId&quot;:&quot;52973471&quot;,&quot;bookUrl&quot;:&quot;/book/show/32479256-the-wanted&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The Wanted (Elvis Cole, #17; Joe Pike, #6)&quot;,&quot;bookTitleBare&quot;:&quot;The Wanted&quot;,&quot;numPages&quot;:266,&quot;avgRating&quot;:4.22,&quot;ratingsCount&quot;:18281,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;When single mother Devon Connor hires private inve…&quot;,&quot;html&quot;: her mother hired, but now, ten years later, Traci is a super-popular influencer with millions of followers and the money to hire a new detective: Elvis Cole.\u003cbr /\u003e\u003cbr /\u003eTaking on a ten-years-cold missing person case is almost always a loser, but Elvis heads to Rancha where he learns an ex-con named Sadie Givens and her daughter, Anya, might have a line on the missing man. But when Elvis finds himself shadowed by a deadly gang of vicious criminals, the simple missing persons case becomes far more sinister and dangerous. Elvis calls in his ex-Marine friend, Joe Pike, to help, but even Pike might not be able to help.\u003cbr /\u003e\u003cbr /\u003eAs Elvis Cole and Joe Pike follow Tommy Beller's trail into the twisted, nightmare depths of a monstrous evil, the case flips on its head. Victims become predators, predators become prey, and when everyone is a victim, can Elvis Cole save them all?\u003cbr /\u003e\u003cbr /\u003eIn a case that tests Elvis Cole's loyalty to his clients and himself, the truth must come out no matter the cost. Elvis must face The Big Empty and see justice done.&quot;},&quot;textReviewsCount&quot;:1170,&quot;publicationDate&quot;:&quot;2025&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;13 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/206727520-the-big-empty&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1350241204i/2041922._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;2041922&quot;,&quot;workId&quot;:&quot;3930256&quot;,&quot;bookUrl&quot;:&quot;/book/show/2041922.The_Monkey_s_Raincoat_Stalking_The_Angel&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The Monkey's Raincoat / Stalking The Angel (Elvis Cole #1-2)&quot;,&quot;bookTitleBare&quot;:&quot;The Monkey's Raincoat / Stal 03e\u003cbr/\u003eTHE MONKEY…&quot;,&quot;html&quot;:&quot;Listening length: Approximately 18 hours\u003cbr /\u003e\u003cbr /\u003eTHE MONKEY'S RAINCOAT Read by David Stuart (Joyce Bean, Russell Byers) \u003cbr /\u003eWhen Ellen Lang's husband disappears with their son, she hires Elvis Cole to track him down. The search for Ellen's errant husband leads Elvis into the seamier side of Hollywood. He soon learns that Mort Lang is a down-on-his-luck talent agent who associates with a schlocky movie producer, and the last place he was spotted was at a party thrown by a famous and very well-connected ex-Matador. But no one has seen him since - including his B-movie girlfriend. At the same time the police find Mort in his parked car with four gunshots in his chest - and no kid in sight - Ellen disappears. Now nothing is what it seems, and the heat is on. It's up to Elvis Cole and his partner Joe Pike to find the connection between sleazy Hollywood players and an ex-Matador. \u003cbr /\u003e\u003cbr /\u003eFREE FALL Read by James Daniels (Sandra Burr, Jill Sovis) \u003cbr /\u003eElvis Cole is just a detective who can't say no, especially to a girl in a terrible fix. And Jennifer Sheridan qualifies: Her fiance, Mark Thurman, is a decorated LA cop with an elite plainclothes unit, but Jennifer's sure he's in trouble - the kind of serious trouble that only Elvis Cole can help him out of. Five minutes after his new client leaves his office, Elvis and his partner, the enigmatic Joe Pike, are hip-deep in a deadly situation as they plummet into a world of South Central gangs, corrupt cops, and conspiracies of silence. And before the case is through, every cop in the LAPD will be gunning for a pair of escaped armed-and-dangerous killers - Elvis Cole and Joe Pike. \u003cbr /\u003e\u003cbr /\u003eLULLABY TOWN Read by James Daniels (Joyce Bean, Russell Byers) \u003cbr /\u003eHollywood's newest wunderkind is Peter Alan Nelson, the brilliant, erratic director known as the King of Adventure. His films make billions, but his manners make enemies. What the boy king wants, he gets, and what Nelson wants is for Elvis to comb the country for the airhead wife and infant child the film-school flunkout dumped en route to becoming the third biggest filmmaker in America. It's the kind of case Cole can handle in his sleep - until it turns out to be a nightmare. For when Cole finds Nelson's wife in a small Connecticut town, she's nothing like what he expects. The lady has some unwanted - and very nasty - mob connections, which means Elvis could be opening the East Coast branch of his P.I. office . . .at the bottom of the Hudson River.&quot;},&quot;textReviewsCount&quot;:6,&quot;publicationDate&quot;:&quot;2003&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;1 edition&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/248111-robert-crais-collection-the-monkey-s-raincoat-free-fall-lullaby-tow&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1466848055i/29542886._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;29542886&quot;,&quot;workId&quot;:&quot;49843908&quot;,&quot;bookUrl&quot;:&quot;/book/show/29542886-elvis-cole-joe-pike-books-4-5&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Elvis Cole/Joe Pike Books 4 \u0026 5: Free Fall / Voodoo River (Elvis Cole, #4-5)&quot;,&quot;bookTitleBare&quot;:&quot;Elvis Cole/Joe Pike Books 4 \u0026 5: Free Fall / Voodoo River&quot;,&quot;numPages&quot;:null,&quot;avgRating&quot;:4.28,&quot;ratingsCount&quot;:18,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003ci\u003e\n  \u003cb\u003eFREE FALL: \u003c/b\u003e\n\u003c/i\u003ePrivate detective Elvis Cole takes …&quot;,&quot;html&quot;:&quot;\u003ci\u003e\n  \u003cb\u003eFREE FALL: \u003c/b\u003e\n\u003c/i\u003ePrivate detective Elvis Cole takes Jennifer Sheridan's case, which involves her decorated Los Angeles-cop boyfriend in some mysterious trouble, and Cole and his partner Pike are soon plunged in police corruption, gangs, and the depiction of themselves as armed killers.\u003cbr /\u003e\u003cbr /\u003e\u003ci\u003e\n  \u003cb\u003eVOODOO RIVER: \u003c/b\u003e\n\u003c/i\u003eL.A. private eye Elvis Cole is hired by popular television star Jodie Taylor to delve into her past and identify the biological parents who gave her up for adoption thirty-six years before. Cole's assignment is to find out their biological history and report back. It seems all too clear cut. But when he gets to Louisiana and begins his search, he finds that there's something much darker going on. Other people are also looking for Taylor's parents, and some are ending up dead.&quot;},&quot;textReviewsCount&quot;:0,&quot;publicationDate&quot;:&quot;&quot;,&quot;toBePublished&quot;:null,&quot;editions&quot;:&quot;1 edition&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/49843908-elvis-cole-joe-pike-books-4-5-free-fall-voodoo-river-elvis-cole&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1346851764i/3281821._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;3281821&quot;,&quot;workId&quot;:&quot;452545&quot;,&quot;bookUrl&quot;:&quot;/book/show/3281821-three-great-novels&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Three Great Novels: Free Fall / Voodoo River / Sunset Express (El n  \u003c/b\u003e\n\u003c/u\u003e\u003cbr /\u003eL.A. private eye Elvis Cole is hired by popular television star Jodie Taylor to delve into her past and identify the biological parents who gave her up for adoption thirty-six years before. But when Cole gets to Louisiana and begins his search, he finds out there's something much darker going on. Other people are also looking for Taylor's parents, and some are ending up dead.\u003cbr /\u003e\u003cbr /\u003e\u003cu\u003e\n  \u003cb\u003e\n    \u003ci\u003eSunset Express\u003c/i\u003e\n  \u003c/b\u003e\n\u003c/u\u003e\u003cbr /\u003eElvis Cole, wisecracking private eye, finds himself embroiled in a controversial L.A. murder case. A wealthy WASP entrepreneur appears to have murdered his wife. A hot-shot defense attorney takes the case and hires Elvis to find proof that the L.A. detective—rumored to be dirty—fooled around with the evidence. But as Elvis investigates, he becomes more suspicious of the media-loving lawyer than the cops.\u003cbr /\u003e\u003cbr /\u003e\u003cu\u003e\n  \u003cb\u003e\n    \u003ci\u003eIndigo Slam\u003c/i\u003e\n  \u003c/b\u003e\n\u003c/u\u003e\u003cbr /\u003eWhen a 15-year-old girl shows up to plead with Elvis to find her errant father, his first impulse is to hand the case over to Social Services. But he sees how hard the kid is working to keep her two siblings together and afloat. As Elvis investigates, he finds the dad seems to be a mover in the criminal underworld who is on the verge of a grand scheme. Events are set in motion that will pit Elvis and Joe Pike against a scary group of counterfeiters—and the even scarier U.S. Marshals.&quot;},&quot;textReviewsCount&quot;:3,&quot;publicationDate&quot;:&quot;2007&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;7 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/452538-robert-crais-collection-3-voodoo-river-sunset-express-indigo-slam&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1632564095i/464143._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;464143&quot;,&quot;workId&quot;:&quot;452568&quot;,&quot;bookUrl&quot;:&quot;/book/show/464143.Sunset_Express_Indigo_Slam&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Sunset Express / Indigo Slam (Elvis Cole, #6-7)&quot;,&quot;bookTitleBare&quot;:&quot;Sunset Express / Indigo Slam&quot;,&quot;numPages&quot;:null,&quot;avgRating&quot;:4.47,&quot;ratingsCount&quot;:117,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Sunset Express: Elvis Cole, wisecracking private e…&quot;,&quot;html&quot;:&quot;Sunset Express: Elvis Cole, wisecracking private eye, finds himself embroiled in a controversial LA murder case. A wealthy WASP entrepreneur appears to have murdered his wife. A hot-shot defense attorney takes the case and hires Elvis to find proof that the L.A. detective - rumored to be dirty - fooled around with the evidence. But as Elvis investigates, he becomes more suspicious of the media-loving lawyer than the cops. With sidekick Joe Pike and girlfriend Lucy Chenier in tow, Elvis carries the day.Indigo Slam: When a 15-year-old girl shows up to plead with Elvis to find her errant father, his first impulse is to hand the case over to Social Services. But he sees how hard the kid is working to keep her two siblings together and afloat. As Elvis and sidekick Joe Pike try their hand at babysitting, events are set in motion that will pit them against a scary group of counterfeiters - and the even scarier U.S. Marshals.&quot;},&quot;textReviewsCount&quot;:1,&quot;publicationDate&quot;:&quot;2002&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;7 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/452568-sunset-express-indigo-slam&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1347707857i/578060._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;578060&quot;,&quot;workId&quot;:&quot;6659501&quot;,&quot;bookUrl&quot;:&quot;/book/show/578060.Three_Great_Novels&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;Three Great Novels: The Bestsellers: L.A. Requiem (Elvis Cole, #8) / Demolition Angel / Hostage&quot;,&quot;bookTitleBare&quot;:&quot;Three Great Novels: The Bestsellers: L.A. Requiem (Elvis Cole, #8) / Demolition Angel / Hostage&quot;,&quot;numPages&quot;:854,&quot;avgRating&quot;:4.46,&quot;ratingsCount&quot;:142,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003cb\u003e\n  \u003ci\u003eL.A. Requiem\u003c/i\u003e\n\u003c/b\u003e — Karen Garcia is missing and her…&quot;,&quot;html&quot;:&quot;\u003cb\u003e\n  \u003ci\u003eL.A. Requiem\u003c/i\u003e\n\u003c/b\u003e — Karen Garcia is missing and her father doesn't trust the cops - so he turns to Elvis Cole and Joe Pike. It seems that Karen may be the latest victim of a distinctive serial killer and the police are determined to pin the blame on a witness. Cole has his doubts, and it's down to him to reveal the killer. But nailing the murderer will mean choosing between the two people he cares about most... (Elvis Cole, #8; originally published 1999)\u003cbr /\u003e\u003cbr /\u003e\u003cb\u003e\n  \u003ci\u003eDemolition Angel\u003c/i\u003e\n\u003c/b\u003e — John Michael Fowles has a natural gift: he understands explosives. It is a talent which he fully expects will take him onto the FBI's Ten Most Wanted list. Along the way he will match himself against the best—an elite team of FBI bomb technicians. When a special agent discovers the link behind the bombs that are killing his team, he knows he must set a trap—with human bait. (Novel; originally published 2000)\u003cbr /\u003e\u003cbr /\u003e\u003cb\u003e\n  \u003ci\u003eHostage\u003c/i\u003e\n\u003c/b\u003e — When a convenience store robbery goes horribly wrong, the teenagers responsible make a run for it and crash into the nearby home of an accountant, taking the family hostage. But the gang have picked the wrong house. The accountant works for the mafia and holds all the local family's financial records. With the mob and the cops soon on the scene, it seems like there's no way out of the nightmarish three-way stand-off... (Novel; originally published 2001)&quot;},&quot;textReviewsCount&quot;:4,&quot;publicationDate&quot;:&quot;&quot;,&quot;toBePublished&quot;:null,&quot;editions&quot;:&quot;4 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/6659501-three-great-novels-the-bestsellers-l-a-requiem-elvis-cole-8-dem&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1332638825i/7792428._SX120_.jpg&quot;,&quot;bookId&quot;:&quot;7792428&quot;,&quot;workId&quot;:&quot;19133130&quot;,&quot;bookUrl&quot;:&quot;/book/show/7792428-the-last-detective-the-forgotten-man-the-two-minute-rule&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The Last Detective / The Forgotten Man / The Two Minute Rule (Elvis Cole, #9,10)&quot;,&quot;bookTitleBare&quot;:&quot;The Last Detective / The Forgotten Man / The Two Minute Rule&quot;,&quot;numPages&quot;:784,&quot;avgRating&quot;:4.51,&quot;ratingsCount&quot;:63,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;THE LAST Elvis Cole\u0026apos;s girlfriend, Lucy, has left h…&quot;,&quot;html&quot;:&quot;THE LAST Elvis Cole's girlfriend, Lucy, has left her young son, Ben, in Elvis's care when he suddenly vanishes. Then Elvis receives a phone call - and realises that something from his own past has come back to haunt him...THE FORGOTTEN An unidentified body has been found in a seedy Los Angeles alley. The only clue the cops have to his identity is a packet of newspaper articles about the past exploits of Elvis Cole - and the fact that before the man died, he said he was Elvis's father. Joe Pike is the only person who can help Elvis navigate his past. But with each clue they uncover, a troubling picture emerges about the dead man...THE TWO MINUTE Ask anyone on the wrong side of the law about the two minute rule and they'll tell you that's as long as you can hope for at a robbery before the cops show up. But not everyone plays by the rules. When an ageing ex-con finally gets out of jail, his son is gunned down in a drive-by shooting. It seems like a random crime, but when the victim is a cop - especially a cop with a con for a father - the motives are never simple...&quot;},&quot;textReviewsCount&quot;:0,&quot;publicationDate&quot;:&quot;&quot;,&quot;toBePublished&quot;:null,&quot;editions&quot;:&quot;1 edition&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/19133130-the-last-detective-the-forgotten-man-the-two-minute-rule&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1468057299i/29469189._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;29469189&quot;,&quot;workId&quot;:&quot;49745539&quot;,&quot;bookUrl&quot;:&quot;/book/show/29469189-the-last-detective-the-forgotten-man-the-watchman-chasing-darkness&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The Last Detective / The Forgotten Man / The Watchman / Chasing Darkness (Elvis Cole, #9-12)&quot;,&quot;bookTitleBare&quot;:&quot;The Last Detective / The Forgotten Man / The Watchman / Chasing Darkness&quot;,&quot;numPages&quot;:null,&quot;avgRating&quot;:4.35,&quot;ratingsCount&quot;:17,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;\u003ci\u003e\n  \u003cb\u003eTHE LAST DETECTIVE: \u003c/b\u003e\n\u003c/i\u003eElvis Cole’s relationship …&quot;,&quot;html&quot;:&quot;\u003ci\u003e\n  \u003cb\u003eTHE LAST DETECTIVE: \u003c/b\u003e\n\u003c/i\u003eElvis Cole’s relationship with attorney Lucy Chenier is strained. When she moved from Louisiana to join Elvis in Los Angeles, she never dreamed that violence would so easily touch her life - but then the unthinkable happens. While Lucy is away on business and her ten-year-old son, Ben, is staying with Elvis, Ben disappears without a trace. Desperate to believe that the boy has run away, evidence soon mounts to suggest a much darker scenario.\u003cbr /\u003e\u003cbr /\u003e\u003ci\u003e\n  \u003cb\u003eTHE FORGOTTEN MAN: \u003c/b\u003e\n\u003c/i\u003eLos Angeles, 3:58 a.m.: Elvis Cole receives the phone call he’s been waiting for since childhood. Responding to a gunshot, the LAPD has found an injured man in an alleyway. He has told the officer on the scene that he is looking for his son, Elvis Cole. Minutes later, the man is dead. Elvis turns to the one person who can help him navigate the minefield of his past – his longtime partner and confidant, Joe Pike.\u003cbr /\u003e\u003cbr /\u003e\u003ci\u003e\n  \u003cb\u003eTHE WATCHMAN: \u003c/b\u003e\n\u003c/i\u003eLarkin Conner Barkley lives like the City of Angels is hers for the taking. She speeds through the city during its loneliest hours, blowing through red after red in her Aston Martin as if running for her life. When she finds herself the sole witness in a secret federal investigation, she becomes the target for a relentless team of killers. Larkin’s wealthy family turns to the one man money can’t buy - Joe Pike.\u003cbr /\u003e\u003cbr /\u003e\u003ci\u003e\n  \u003cb\u003eCHASING DARKNESS: \u003c/b\u003e\n\u003c/i\u003eIt's fire season, and the hills of Los Angeles are burning. As the residents of Laurel Canyon are being evacuated from their homes, Police and Fire Department personnel find the corpse of a recluse who apparently committed suicide. Clutched in his lap is a photo album containing photographs of seven young women who have been murdered.\u003cbr /\u003e\u003cbr /\u003eLAPD homicide detectives had never connected the seven murders before and only one suspect has been charged in any of the murders - the suicide now discovered in the fire, Elliot Martin. Three years earlier, Martin had been brought to trial, but his defense attorney hired Elvis Cole to investigate. Cole found an exculpatory videotape that prompted the judge to dismiss the charges. But now Cole doesn't know what to believe, so he digs hard to uncover the truth - and escape his terrible guilt.&quot;},&quot;textReviewsCount&quot;:1,&quot;publicationDate&quot;:&quot;&quot;,&quot;toBePublished&quot;:null,&quot;editions&quot;:&quot;1 edition&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/49745539-the-last-detective-the-forgotten-man-the-watchman-chasing-darkness&quot;}},{&quot;isLibrarianView&quot;:false,&quot;readOnlyStars&quot;:false,&quot;book&quot;:{&quot;imageUrl&quot;:&quot;https://i.gr-assets.com/images/S/compressed.photo.goodreads.com/books/1411597730i/22817427._SY180_.jpg&quot;,&quot;bookId&quot;:&quot;22817427&quot;,&quot;workId&quot;:&quot;42367528&quot;,&quot;bookUrl&quot;:&quot;/book/show/22817427-the-first-rule-the-sentry-taken&quot;,&quot;from_search&quot;:false,&quot;from_srp&quot;:false,&quot;qid&quot;:null,&quot;rank&quot;:null,&quot;title&quot;:&quot;The First Rule / The Sentry / Taken (Elvis Cole, #13-15)&quot;,&quot;bookTitleBare&quot;:&quot;The First Rule / The Sentry / Taken&quot;,&quot;numPages&quot;:0,&quot;avgRating&quot;:4.56,&quot;ratingsCount&quot;:43,&quot;author&quot;:{&quot;id&quot;:8944,&quot;name&quot;:&quot;Robert Crais&quot;,&quot;isGoodreadsAuthor&quot;:false,&quot;profileUrl&quot;:&quot;https://www.goodreads.com/author/show/8944.Robert_Crais&quot;,&quot;worksListUrl&quot;:&quot;https://www.goodreads.com/author/list/8944.Robert_Crais&quot;},&quot;kcrPreviewUrl&quot;:null,&quot;description&quot;:{&quot;truncatedHtml&quot;:&quot;Three Robert Crais titles together for the first t…&quot;,&quot;html&quot;:&quot;Three Robert Crais titles together for the first time in one collection\u003cbr /\u003e\u003cbr /\u003e\u003cb\u003e\n  \u003ci\u003eThe First Rule\u003c/i\u003e\n\u003c/b\u003e\u003cbr /\u003eThe organized criminal gangs of the former Soviet Union are bound by what they call the thieves’ code. The first rule is this: A thief must forsake his mother, father, brothers, and sisters. He must have no family—no wife, no children—because only other criminals are his family. If any of the rules are broken, it is punishable by death. Frank Meyer had the American dream—a wife and family he adored, a successful business—until the day a professional crew invaded his home and murdered everyone inside. The only thing out of the ordinary about Meyer was that—before the family and the business and the normal life—a younger Frank Meyer worked as a professional military contractor, a mercenary, with a man named Joe Pike. Frank was one of Pike’s guys, and they faced death together in every rotten hellhole around the world. The police think Meyer was hiding something very bad, because previous home invasions by the crew had targeted only criminals with large stashes of cash or drugs. Pike cannot believe it, and with the help of Cole, he sets out on a hunt of his own: to clear his friend, to punish the people who murdered him. A trail that at first seems relatively simple, however, very quickly becomes complicated, as the two of them find themselves entangled in a web of ancient grudges, blood ties, blackmail, vengeance, double crosses, and cutthroat criminality, and at the heart of it all, an act so terrible even Pike and Cole have no way to measure it.\u003cbr /\u003e\u003cbr /\u003e\u003cb\u003e\n  \u003ci\u003eThe Sentry\u003c/i\u003e\n\u003c/b\u003e\u003cbr /\u003eFive years ago, Dru Rayne and her uncle fled from Louisiana to Los Angeles after Hurricane Katrina hit, but now they face a different kind of danger. A neighborhood protection gang savagely beats Dru’s uncle, but Pike witnesses it and offers his own brand of protection. Oddly enough, neither of them seems to want it—and neither do the federal agents mysteriously watching their storefront, men who appear quite willing to let the gang have its way. None of that deters Pike—there’s something about Dru that touches him and he won’t back away, whether she wants his help or not—but as the level of violence escalates, and Pike himself becomes a target, he and Elvis Cole begin to discover some things. Dru and her uncle are not who they seem, and everything Pike thought he knew about them, their relationship to the gang, and the reasons they fled New Orleans—it’s all been lies. A vengeful and murderous force is catching up to them...and it’s perfectly happy to sweep Pike and Cole up in its wake.\u003cbr /\u003e\u003cbr /\u003e\u003cb\u003e\n  \u003ci\u003eTaken\u003c/i\u003e\n\u003c/b\u003e\u003cbr /\u003eCrais has never written a book with the power and intensity of \u003ci\u003eTaken\u003c/i\u003e. When Nita Morales hires Elvis Cole to find her missing adult daughter, she isn’t afraid, even though she’s gotten a phone call asking for ransom. She knows it’s a fake, that her daughter is off with the guy Nita will call only “that boy,” and that they need money: “Even smart girls do stupid things when they think a boy loves them.” But she is wrong. The girl and her boyfriend have been taken by bajadores—bandits who prey on other bandits, border professionals who prey not only on innocent victims, but on one another. They steal drugs, guns, and people—buying and selling victims like commodities, and killing the ones they can’t get a price for. Cole and Pike find the spot where the couple were taken. There are tire tracks, bullet casings, and bloodstains. They know things look as bad as possible. But they are wrong, too. It is about to get much worse. Going undercover to find the couple and buy them back, Cole himself is taken, and disappears. Now it is up to Joe Pike to retrace Cole’s steps, burning through the hard and murderous world of human traffickers to find his friend. But he may already be too late.&quot;},&quot;textReviewsCount&quot;:0,&quot;publicationDate&quot;:&quot;2014&quot;,&quot;toBePublished&quot;:false,&quot;editions&quot;:&quot;5 editions&quot;,&quot;editionsUrl&quot;:&quot;/work/editions/42367528-the-first-rule-the-sentry-taken-elvis-cole-13-15&quot;}}],&quot;seriesHeaders&quot;:[&quot;Book 3&quot;,&quot;Book 4&quot;,&quot;Book 5&quot;,&quot;Book 6&quot;,&quot;Book 7&quot;,&quot;Book 8&quot;,&quot;Book 9&quot;,&quot;Book 10&quot;,&quot;Book 11&quot;,&quot;Book 12&quot;,&quot;Book 13&quot;,&quot;Book 14&quot;,&quot;Book 15&quot;,&quot;Book 16&quot;,&quot;Book 17&quot;,&quot;Book 18&quot;,&quot;Book 19&quot;,&quot;Book 20&quot;,&quot;Book 1-2&quot;,&quot;Book 1-3&quot;,&quot;Book 1,4,3&quot;,&quot;Book 4-5&quot;,&quot;Book 4-6&quot;,&quot;Book 4,7&quot;,&quot;Book 5-7&quot;,&quot;Book 6-7&quot;,&quot;Book 8&quot;,&quot;Book 9-10&quot;,&quot;Book 9-12&quot;,&quot;Book 13-15&quot;]}"></div>
